<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sports Bros AI v0.5.1</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f4f5;color:#111;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}button,input,textarea{font:inherit}.hide{display:none!important}.setup{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}.card{width:100%;max-width:520px;background:#fff;border:1px solid #ddd;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px #0002}.head{background:#111;color:#fff;padding:24px}.head p{color:#ccc}.form{padding:20px;display:grid;gap:14px}input,textarea{width:100%;border:1px solid #ddd;border-radius:16px;padding:12px}.btn{border:1px solid #ddd;border-radius:14px;background:#fff;padding:10px 12px;font-weight:700}.pri{background:#111;color:#fff}.app{height:100dvh;display:flex}.side{width:390px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column}.sideHead{padding:14px;border-bottom:1px solid #ddd}.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.threads{padding:8px;overflow:auto}.thread{width:100%;border:0;background:#fff;border-radius:18px;padding:10px;display:flex;gap:10px;text-align:left}.thread.on,.thread:hover{background:#eee}.av{width:42px;height:42px;border-radius:16px;background:#111;color:#fff;display:grid;place-items:center;font-weight:900;overflow:hidden}.av img{width:100%;height:100%;object-fit:cover}.meta{min-width:0}.name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.prev{font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat{flex:1;height:100dvh;display:flex;flex-direction:column}.top{min-height:62px;border-bottom:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px;gap:8px}.topLeft{display:flex;gap:10px;align-items:center}.topBtns{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.msgs{flex:1;overflow:auto;padding:14px}.inner{max-width:860px;margin:auto;display:grid;gap:12px}.hint{background:#fff;border:1px solid #ddd;border-radius:20px;padding:12px;color:#555}.row{display:flex;gap:10px}.row.me{justify-content:flex-end}.col{max-width:min(78%,620px)}.sender{font-size:12px;color:#666;margin:0 0 4px 4px}.bubble{background:#fff;border:1px solid #ddd;border-radius:20px 20px 20px 6px;padding:10px 13px;white-space:pre-wrap;line-height:1.55}.me .bubble{background:#111;color:#fff;border-color:#111;border-radius:20px 20px 6px 20px}.mark{font-size:11px;color:#999}.comp{border-top:1px solid #ddd;background:#fff;padding:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}.cf{max-width:860px;margin:auto;display:flex;gap:8px}.send{width:48px;border-radius:999px}.mask{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center;padding:14px;z-index:9}.modal{width:100%;max-width:520px;background:#fff;border-radius:22px;padding:16px}.modal textarea{min-height:120px}.actions{display:flex;justify-content:space-between;gap:8px;margin-top:10px}.back{display:none}.err{color:#b91c1c;padding:8px}@media(max-width:760px){.side{width:100%;height:100dvh}.chat{position:fixed;inset:0;background:#f4f4f5;transform:translateX(100%);transition:.18s;z-index:2}.chat.open{transform:translateX(0)}.back{display:inline-block}.topBtns .optional{display:none}.col{max-width:82%}}</style></head><body><section id="setup" class="setup"><div class="card"><div class="head"><h1>今晚打不打球</h1><p>v0.5.1 稳定版：IM、备注、备份、编辑上下文、重生成。</p></div><form id="setupForm" class="form"><label>Endpoint<input id="endpoint" value="https://api.deepseek.com"></label><label>API Key<input id="apiKey" type="password" placeholder="sk-..."></label><label>Model<input id="model" value="deepseek-chat"></label><button class="btn pri">进入 IM</button></form></div></section><section id="app" class="app hide"><aside class="side"><div class="sideHead"><div style="display:flex;justify-content:space-between;align-items:center"><div><h2 style="margin:0">消息</h2><div id="sideSub" class="prev"></div></div><button id="resetCfg" class="btn">配置</button></div><div class="tools"><button id="profile" class="btn">资料</button><button id="backup" class="btn">备份</button><button id="importBtn" class="btn">导入</button><button id="editToggle" class="btn">编辑关</button><input id="file" type="file" accept="application/json" class="hide"></div></div><div id="threads" class="threads"></div></aside><main id="chat" class="chat"><header class="top"><div class="topLeft"><button id="back" class="btn back">‹</button><div id="chatAv" class="av">群</div><div><div id="chatName" class="name"></div><div id="chatSub" class="prev"></div></div></div><div class="topBtns"><button id="coach" class="btn">教练</button><button id="remark" class="btn">备注</button><button id="regen" class="btn optional">改最后并重生</button><button id="clear" class="btn optional">清空</button></div></header><section class="msgs"><div class="inner"><div id="hint" class="hint"></div><div id="list" class="inner"></div><div id="typing" class="row hide"><div class="av">…</div><div class="bubble">生成中...</div></div><div id="anchor"></div></div></section><div id="err" class="err"></div><footer class="comp"><form id="chatForm" class="cf"><input id="input" placeholder="发消息..."><button class="btn pri send">➤</button></form></footer></main></section><div id="mask" class="mask hide"><div class="modal"><h3 id="modalTitle"></h3><div id="modalBody"></div><div class="actions"><button id="deleteMsg" class="btn">删除</button><div><button id="cancel" class="btn">取消</button><button id="save" class="btn pri">保存</button></div></div></div></div><script>var CFG='sports-bros-cfg-v051';var STATE='sports-bros-state-v051';var agents=[{id:'zhouye',name:'周野',tag:'篮球队',av:'周',sys:'你叫周野，22岁，篮球队，外向，像群里的组织者。你把用户当兄弟。短句，直接，爱喊吃饭打球。不要暧昧，不要乙游。'},{id:'chenxiao',name:'陈骁',tag:'足球队',av:'陈',sys:'你叫陈骁，22岁，足球队，嘴欠损友。你把用户当兄弟。爱吐槽起哄但没有恶意。不要攻击真实痛点。'},{id:'linchuan',name:'林川',tag:'田径队',av:'林',sys:'你叫林川，23岁，田径队，话少，行动派。你把用户当兄弟。关心直接，常说吃没、下来走走、我顺路。不要大段开导。'},{id:'zhaokai',name:'赵恺',tag:'健身房',av:'赵',sys:'你叫赵恺，22岁，常年健身，自律。你把用户当兄弟。经常催吃饭喝水睡觉，语气直接靠谱。'},{id:'ahang',name:'阿航',tag:'游泳队',av:'航',sys:'你叫阿航，21岁，游泳队，阳光话多爱接梗。你把用户当兄弟，负责把聊天变热闹。'}];var threads=[{id:'group',type:'group',name:'今晚打不打球',tag:'置顶群聊',av:'群'}].concat(agents.map(function(a){var b=Object.assign({},a);b.type='agent';return b})).concat([{id:'coach',type:'coach',name:'兄弟相处教练',tag:'私下建议',av:'教'}]);var cfg=null,active='group',editing=null,modalMode='',loading=false;function msg(role,sender,content){return{id:String(Date.now())+Math.random().toString(36).slice(2),role:role,sender:sender,content:content,ts:Date.now()}}function defaults(){return{prefs:{name:'我',avatar:'我',avatarUrl:'',edit:false,remarks:{}},conv:{group:[msg('assistant','周野','进群了啊。以后这就是「今晚打不打球」。'),msg('assistant','陈骁','先说好，进群了就别装高冷。'),msg('assistant','阿航','晚上吃不吃夜宵，先投票。')],zhouye:[msg('assistant','周野','有事直接说。刚练完，手机在手。')],chenxiao:[msg('assistant','陈骁','咋了，又来找我唠嗑？')],linchuan:[msg('assistant','林川','嗯，我在。')],zhaokai:[msg('assistant','赵恺','先问一句，今天吃饭没。')],ahang:[msg('assistant','阿航','你来得正好，我刚想找人说话。')],coach:[]},mem:{global:[],zhouye:[],chenxiao:[],linchuan:[],zhaokai:[],ahang:[]},coachVisible:false}}var S=defaults();function $(x){return document.querySelector(x)}function esc(x){return String(x||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function saveState(){localStorage.setItem(STATE,JSON.stringify(S))}function getConv(id){id=id||active;if(!S.conv[id])S.conv[id]=[];return S.conv[id]}function thread(id){return threads.find(function(t){return t.id===(id||active)})||threads[0]}function agent(id){return agents.find(function(a){return a.id===id})}function displayName(t){return t.type==='agent'?(S.prefs.remarks[t.id]||t.name):t.name}function senderName(n){var a=agents.find(function(x){return x.name===n});return a?(S.prefs.remarks[a.id]||a.name):n}function avatarHtml(){return S.prefs.avatarUrl?'<img src="'+esc(S.prefs.avatarUrl)+'">':esc((S.prefs.avatar||S.prefs.name||'我').slice(0,2))}function apiUrl(){var u=cfg.endpoint.trim().replace(/\/$/,'');if(u.endsWith('/chat/completions'))return u;if(u.endsWith('/v1'))return u+'/chat/completions';return u+'/v1/chat/completions'}async function callLLM(messages,temp){var r=await fetch(apiUrl(),{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.key},body:JSON.stringify({model:cfg.model,messages:messages,temperature:temp||0.85,stream:false})});var text=await r.text();var data;try{data=JSON.parse(text)}catch(e){data={}}if(!r.ok)throw Error((data.error&&data.error.message)||text);return data.choices[0].message.content.trim()}function recent(id){return getConv(id).filter(function(m){return m.role!=='coach'}).slice(-16).map(function(m){return{role:m.role==='user'?'user':'assistant',content:(m.sender==='我'?S.prefs.name:m.sender)+'：'+m.content}})}function groupPrompt(){return '你在模拟中文IM兄弟群。用户叫'+S.prefs.name+'。用户是群里兄弟，不是恋爱对象。成员：周野篮球队组织者；陈骁足球队嘴欠损友；林川田径队话少行动派；赵恺健身自律；阿航游泳队阳光话多。每次回复2到4条，格式“角色名：消息”。短句口语，可以互相插话，不写小说旁白，不替用户说话，不暧昧。'}function singlePrompt(a){return a.sys+'\n当前是一对一私聊。用户叫'+S.prefs.name+'。回复1到4句，像真实IM私聊。不要输出名字前缀。'}function coachPrompt(){return '你是兄弟相处教练，只私下帮助用户学习如何和直男体育生兄弟自然相处。输出：评分、判断、风险、改法3条、下次建议。'}function parseGroup(raw){var arr=[];raw.split(/\n+/).forEach(function(line){var m=line.trim().match(/^([^：:]{1,8})[：:](.+)$/);if(m&&agents.some(function(a){return a.name===m[1].trim()}))arr.push({sender:m[1].trim(),content:m[2].trim()})});return arr.length?arr.slice(0,5):[{sender:'周野',content:raw.slice(0,200)}]}function needsCoach(t){return /^\/coach/i.test(t)||['教练','帮我看看','怎么回','尴尬','不太会','怎么和男生'].some(function(k){return t.includes(k)})}function render(){var has=!!cfg;$('#setup').classList.toggle('hide',has);$('#app').classList.toggle('hide',!has);if(!has)return;$('#sideSub').textContent=cfg.model+' · '+S.prefs.name;$('#editToggle').textContent=S.prefs.edit?'编辑开':'编辑关';$('#editToggle').classList.toggle('pri',S.prefs.edit);var shown=threads.filter(function(t){return t.id!=='coach'||S.coachVisible||getConv('coach').length});$('#threads').innerHTML=shown.map(function(t){var last=getConv(t.id).slice(-1)[0];var preview=last?(last.sender==='我'?S.prefs.name:senderName(last.sender))+'：'+last.content:t.tag;return '<button class="thread '+(active===t.id?'on':'')+'" data-id="'+t.id+'"><div class="av">'+esc(t.av)+'</div><div class="meta"><div class="name">'+esc(displayName(t))+'</div><div class="prev">'+esc(preview)+'</div></div></button>'}).join('');document.querySelectorAll('.thread').forEach(function(b){b.onclick=function(){active=b.dataset.id;$('#chat').classList.add('open');render()}});var t=thread();$('#chatName').textContent=displayName(t);$('#chatSub').textContent=t.type==='group'?'置顶群聊':t.tag;$('#chatAv').textContent=t.av;$('#remark').classList.toggle('hide',t.type!=='agent');$('#coach').classList.toggle('hide',t.type==='coach');$('#hint').textContent=t.type==='group'?'群聊。编辑开后点消息可改上下文；“改最后并重生”会重生成最新回复。':t.type==='coach'?'教练区。':'私聊。备注名只在本机显示。';$('#list').innerHTML=getConv().map(function(m){if(m.role==='coach')return '<div class="coach"><pre>'+esc(m.content)+'</pre></div>';var me=m.role==='user';var a=agents.find(function(x){return x.name===m.sender});var av=me?avatarHtml():esc(a?a.av:m.sender.slice(0,1));return '<div class="row '+(me?'me':'')+'">'+(me?'':'<div class="av">'+av+'</div>')+'<div class="col">'+(me?'':'<div class="sender">'+esc(senderName(m.sender))+'</div>')+'<div class="bubble" data-mid="'+m.id+'">'+esc(m.content)+'</div>'+(m.edited?'<div class="mark">已修改</div>':'')+'</div>'+(me?'<div class="av">'+avatarHtml()+'</div>':'')+'</div>'}).join('');document.querySelectorAll('[data-mid]').forEach(function(el){el.onclick=function(){if(S.prefs.edit)openEdit(el.dataset.mid,'edit')}});$('#typing').classList.toggle('hide',!loading);$('#anchor').scrollIntoView({block:'end'})}function showErr(x){$('#err').textContent=x||''}async function generate(id){var t=thread(id);loading=true;render();try{if(t.type==='group'){var raw=await callLLM([{role:'system',content:groupPrompt()}].concat(recent('group')),0.9);parseGroup(raw).forEach(function(r){getConv('group').push(msg('assistant',r.sender,r.content))})}else if(t.type==='agent'){var a=agent(id);var raw2=await callLLM([{role:'system',content:singlePrompt(a)}].concat(recent(id)),0.86);getConv(id).push(msg('assistant',a.name,raw2))}saveState()}catch(e){showErr(e.message)}finally{loading=false;render()}}async function send(text){if(!text||loading)return;showErr('');var id=active;getConv(id).push(msg('user','我',text));saveState();render();try{if(id!=='coach'&&needsCoach(text)){S.coachVisible=true;active='coach';getConv('coach').push(msg('user','我',text));var cr=await callLLM([{role:'system',content:coachPrompt()},{role:'user',content:text}],0.45);getConv('coach').push(Object.assign(msg('coach','教练',cr),{role:'coach'}));saveState();render();return}if(thread(id).type==='coach'){var c=await callLLM([{role:'system',content:coachPrompt()}].concat(recent('coach')),0.45);getConv('coach').push(Object.assign(msg('coach','教练',c),{role:'coach'}));saveState();render();return}await generate(id)}catch(e){showErr(e.message)}}function openModal(title,html,mode){modalMode=mode;$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#deleteMsg').classList.toggle('hide',mode!=='edit');$('#mask').classList.remove('hide')}function closeModal(){$('#mask').classList.add('hide');editing=null}function openEdit(mid,mode){var c=getConv();var i=c.findIndex(function(x){return x.id===mid});if(i<0||c[i].role==='coach')return;editing={id:mid,mode:mode};openModal(mode==='regen'?'修改最后一句并重生':'修改消息','<textarea id="editText">'+esc(c[i].content)+'</textarea><small>保存后会修改上下文。</small>',mode)}function saveModal(){if(modalMode==='profile'){S.prefs.name=$('#pname').value.trim()||'我';S.prefs.avatar=$('#pav').value.trim()||'我';S.prefs.avatarUrl=$('#purl').value.trim();saveState();closeModal();render();return}if(modalMode==='remark'){S.prefs.remarks[active]=$('#rname').value.trim();saveState();closeModal();render();return}var c=getConv();var i=c.findIndex(function(x){return x.id===editing.id});var v=$('#editText').value.trim();if(i>=0&&v){c[i].content=v;c[i].edited=true;if(editing.mode==='regen'){c.splice(i+1);saveState();closeModal();generate(active);return}saveState()}closeModal();render()}function delModal(){var c=getConv();var i=c.findIndex(function(x){return x.id===(editing&&editing.id)});if(i>=0)c.splice(i,1);saveState();closeModal();render()}function openProfile(){openModal('个人资料','<label>名称<input id="pname" value="'+esc(S.prefs.name)+'"></label><label>文字头像<input id="pav" value="'+esc(S.prefs.avatar)+'"></label><label>头像URL/Base64<input id="purl" value="'+esc(S.prefs.avatarUrl)+'"></label>','profile')}function openRemark(){openModal('备注名','<label>备注名<input id="rname" value="'+esc(S.prefs.remarks[active]||'')+'"></label><small>仅本机显示。</small>','remark')}function regenLast(){var c=getConv();for(var i=c.length-1;i>=0;i--){if(c[i].role==='user'){openEdit(c[i].id,'regen');return}}showErr('当前会话没有你的消息')}function backup(){var blob=new Blob([JSON.stringify({version:'v0.5.1',state:S},null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sports-bros-backup.json';a.click();URL.revokeObjectURL(a.href)}function importBackup(file){var r=new FileReader();r.onload=function(){try{var d=JSON.parse(r.result);if(d.state){S=d.state;saveState();render()}else showErr('格式不对')}catch(e){showErr(e.message)}};r.readAsText(file)}function init(){try{cfg=JSON.parse(localStorage.getItem(CFG)||'null');var old=JSON.parse(localStorage.getItem(STATE)||'null');if(old)S=Object.assign(defaults(),old)}catch(e){}$('#setupForm').onsubmit=function(e){e.preventDefault();cfg={endpoint:$('#endpoint').value.trim(),key:$('#apiKey').value.trim(),model:$('#model').value.trim()};localStorage.setItem(CFG,JSON.stringify(cfg));render()};$('#resetCfg').onclick=function(){localStorage.removeItem(CFG);cfg=null;render()};$('#chatForm').onsubmit=function(e){e.preventDefault();var v=$('#input').value.trim();$('#input').value='';send(v)};$('#back').onclick=function(){$('#chat').classList.remove('open')};$('#profile').onclick=openProfile;$('#remark').onclick=openRemark;$('#regen').onclick=regenLast;$('#backup').onclick=backup;$('#importBtn').onclick=function(){$('#file').click()};$('#file').onchange=function(e){if(e.target.files[0])importBackup(e.target.files[0])};$('#editToggle').onclick=function(){S.prefs.edit=!S.prefs.edit;saveState();render()};$('#coach').onclick=function(){S.coachVisible=true;active='coach';$('#chat').classList.add('open');render()};$('#clear').onclick=function(){getConv(active).length=0;saveState();render()};$('#cancel').onclick=closeModal;$('#save').onclick=saveModal;$('#deleteMsg').onclick=delModal;$('#mask').onclick=function(e){if(e.target.id==='mask')closeModal()};render()}init();</script></body></html>
