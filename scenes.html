<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>场景模式 - 今晚打不打球</title><style>*{box-sizing:border-box}body{margin:0;background:#0f0f12;color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}button,input,textarea{font:inherit}.hide{display:none!important}.setup{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#111,#18181b)}.card{width:100%;max-width:560px;background:#18181b;border:1px solid #3f3f46;border-radius:30px;overflow:hidden;box-shadow:0 24px 80px #0008}.head{padding:28px;background:#09090b}.head h1{margin:0;font-size:24px}.head p{color:#a1a1aa;line-height:1.7}.form{padding:24px;display:grid;gap:16px}label span{display:block;font-size:14px;font-weight:750;margin-bottom:8px;color:#d4d4d8}input,textarea,select{width:100%;border:1px solid #3f3f46;background:#09090b;color:#f4f4f5;border-radius:18px;padding:14px 15px;outline:0}.btn{border:1px solid #3f3f46;background:#27272a;color:#f4f4f5;border-radius:18px;padding:10px 12px;font-weight:750;cursor:pointer}.pri{background:#f4f4f5!important;color:#09090b!important;border-color:#f4f4f5!important}.app{height:100dvh;display:grid;grid-template-columns:320px 1fr 360px}.side,.im{background:#18181bcc;border-color:#3f3f46;padding:14px;overflow:auto}.side{border-right:1px solid #3f3f46}.im{border-left:1px solid #3f3f46}.scene{display:flex;flex-direction:column;min-width:0}.top{min-height:64px;border-bottom:1px solid #3f3f46;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px;background:#18181bcc}.title{font-weight:900;font-size:18px}.sub{font-size:12px;color:#a1a1aa}.panel{border:1px solid #3f3f46;background:#18181b;border-radius:24px;padding:14px;margin-bottom:12px}.members{display:grid;gap:8px}.member{display:flex;gap:10px;align-items:center;padding:10px;border:1px solid #3f3f46;border-radius:18px;background:#09090b}.av{width:38px;height:38px;border-radius:15px;display:grid;place-items:center;background:#27272a;font-weight:900}.stage{flex:1;overflow:auto;padding:16px}.stageInner{max-width:820px;margin:auto;display:grid;gap:14px}.narration{background:#18181b;border:1px solid #3f3f46;border-radius:26px;padding:16px;line-height:1.8;color:#e4e4e7}.line{display:flex;gap:10px;align-items:flex-start}.bubble{background:#27272a;border:1px solid #3f3f46;border-radius:22px;padding:11px 14px;line-height:1.65;white-space:pre-wrap}.me{justify-content:flex-end}.me .bubble{background:#f4f4f5;color:#09090b}.actions{display:flex;gap:8px;flex-wrap:wrap}.act{border-radius:999px}.comp{border-top:1px solid #3f3f46;padding:12px;background:#18181bcc}.cf{max-width:820px;margin:auto;display:flex;gap:8px}.send{width:50px;border-radius:999px}.msg{padding:10px;border-radius:16px;background:#09090b;border:1px solid #3f3f46;margin-bottom:8px;color:#e4e4e7}.msg b{display:block;margin-bottom:4px}.err{color:#fecaca;padding:10px}.tabs{display:flex;gap:8px;margin-bottom:12px}.tab.on{background:#f4f4f5;color:#09090b}@media(max-width:900px){.app{display:block}.side,.im{display:none}.scene{height:100dvh}.top{position:sticky;top:0}.stage{padding:12px}.bubble{max-width:84vw}}</style></head><body><section id="setup" class="setup"><div class="card"><div class="head"><h1>场景模式</h1><p>用户和体育生处在同一个场景里。Scene Agent 负责环境描写和快捷行为，体育生 Agent 增加轻量动作描写。</p></div><form id="sf" class="form"><label><span>Endpoint</span><input id="ep" value="https://api.deepseek.com"></label><label><span>API Key</span><input id="key" type="password" placeholder="sk-..."></label><label><span>Model</span><input id="model" value="deepseek-chat"></label><button class="btn pri">进入场景</button></form></div></section><section id="app" class="app hide"><aside class="side"><div class="panel"><div class="title">场景设置</div><p class="sub">当前是 feature/scenes 原型。</p><label><span>场景</span><select id="sceneSel"><option>宿舍</option><option>篮球场</option><option>操场</option><option>夜宵摊</option><option>便利店</option><option>健身房</option><option>雨天校门口</option></select></label><button id="changeScene" class="btn pri" style="margin-top:10px;width:100%">切换场景</button></div><div class="panel"><div class="title">同场景的人</div><div id="members" class="members"></div></div></aside><main class="scene"><header class="top"><div><div id="sceneTitle" class="title">宿舍</div><div class="sub">场景模式 · IM 可以独立打开</div></div><div><button id="imBtn" class="btn">IM</button><button id="reset" class="btn">重开</button></div></header><section class="stage"><div class="stageInner"><div id="hint" class="narration">宿舍灯开着，桌上摊着外卖袋和几瓶水。周野靠在椅背上刷手机，陈骁在旁边嘴碎，林川坐在床边系鞋带，赵恺把蛋白粉杯放到桌上，阿航趴在椅背上问今晚还出不出去。</div><div id="log"></div><div id="quick" class="actions"></div><div id="err" class="err hide"></div></div></section><footer class="comp"><form id="cf" class="cf"><input id="mi" placeholder="输入你在场景里的话或动作，比如：我靠在门口说今天累死了"><button class="btn pri send">➤</button></form></footer></main><aside id="im" class="im"><div class="tabs"><button class="btn tab on">群聊</button><button class="btn tab">周野</button><button class="btn tab">林川</button></div><div class="msg"><b>周野</b>走啊，别在宿舍长蘑菇。</div><div class="msg"><b>陈骁</b>他今天看着像被训练榨干了。</div><div class="msg"><b>阿航</b>那更得出去吃点东西。</div></aside></section><script>const CK='sports-bros-scene-cfg-v1',SK='sports-bros-scene-state-v1';const A=[['周野','篮球队','周'],['陈骁','足球队','陈'],['林川','田径队','林'],['赵恺','健身','赵'],['阿航','游泳队','航']];let cfg=null,S={scene:'宿舍',log:[],quick:['说：走啊，吃夜宵去','靠在椅背上不想动','问他们今天训练累不累','让林川陪你下楼走走']};const $=s=>document.querySelector(s),E=s=>String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');function save(){localStorage.setItem(SK,JSON.stringify(S))}function norm(u){u=u.trim().replace(/\/$/,'');return u.endsWith('/chat/completions')?u:u.endsWith('/v1')?u+'/chat/completions':u+'/v1/chat/completions'}async function llm(msgs,temp=.9){let r=await fetch(norm(cfg.endpoint),{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+cfg.key},body:JSON.stringify({model:cfg.model,messages:msgs,temperature:temp,stream:false})});let tx=await r.text(),d;try{d=JSON.parse(tx)}catch{d={raw:tx}}if(!r.ok)throw Error(d?.error?.message||tx);return d.choices[0].message.content.trim()}function sys(){return`你是一个场景模式总控 Scene Agent。当前场景：${S.scene}。用户和五个直男体育生兄弟处在同一个现实场景里：周野篮球队、陈骁足球队、林川田径队、赵恺健身、阿航游泳队。你要输出：1）一段简短场景描写；2）2到4条体育生反应，每条格式“名字：动作 + 话”；3）3个快捷行为选项。允许轻量动作描写，但不要小说化长篇，不替用户行动，保持兄弟关系，不暧昧。输出格式严格如下：\n场景：...\n周野：...\n陈骁：...\n快捷：选项1｜选项2｜选项3`}function render(){let has=!!cfg;$('#setup').classList.toggle('hide',has);$('#app').classList.toggle('hide',!has);if(!has)return;$('#sceneTitle').textContent=S.scene;$('#sceneSel').value=S.scene;$('#members').innerHTML=A.map(a=>`<div class="member"><div class="av">${a[2]}</div><div><b>${a[0]}</b><div class="sub">${a[1]}</div></div></div>`).join('');$('#log').innerHTML=S.log.map(x=>x.role=='me'?`<div class="line me"><div class="bubble">${E(x.text)}</div></div>`:x.role=='scene'?`<div class="narration">${E(x.text)}</div>`:`<div class="line"><div class="av">${E(x.name.slice(0,1))}</div><div class="bubble"><b>${E(x.name)}</b><br>${E(x.text)}</div></div>`).join('');$('#quick').innerHTML=S.quick.map(q=>`<button class="btn act" data-q="${E(q)}">${E(q)}</button>`).join('');document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>send(b.dataset.q));$('#hint').textContent=`当前场景：${S.scene}。Scene Agent 会描写环境，体育生 Agent 会带轻量动作描写。`}function parse(raw){let lines=raw.split(/\n+/).map(x=>x.trim()).filter(Boolean),qs=[];for(let l of lines){if(l.startsWith('场景'))S.log.push({role:'scene',text:l.replace(/^场景[:：]/,'')});else if(l.startsWith('快捷'))qs=l.replace(/^快捷[:：]/,'').split(/[｜|]/).map(x=>x.trim()).filter(Boolean);else{let m=l.match(/^([^：:]{1,8})[：:](.+)$/);if(m)S.log.push({role:'agent',name:m[1],text:m[2]})}}if(qs.length)S.quick=qs.slice(0,5)}async function send(text){if(!text)return;S.log.push({role:'me',text});save();render();try{let raw=await llm([{role:'system',content:sys()},...S.log.slice(-12).map(x=>({role:x.role=='me'?'user':'assistant',content:x.role=='me'?x.text:(x.name?x.name+'：'+x.text:x.text)})),{role:'user',content:text}],.92);parse(raw);save();render()}catch(e){$('#err').textContent=e.message;$('#err').classList.remove('hide')}}function init(){cfg=JSON.parse(localStorage.getItem(CK)||'null');let old=JSON.parse(localStorage.getItem(SK)||'null');if(old)S={...S,...old};$('#sf').onsubmit=e=>{e.preventDefault();cfg={endpoint:$('#ep').value.trim(),key:$('#key').value.trim(),model:$('#model').value.trim()};localStorage.setItem(CK,JSON.stringify(cfg));render()};$('#cf').onsubmit=e=>{e.preventDefault();let v=$('#mi').value.trim();$('#mi').value='';send(v)};$('#changeScene').onclick=()=>{S.scene=$('#sceneSel').value;S.log.push({role:'scene',text:'场景切换到：'+S.scene});save();render()};$('#reset').onclick=()=>{S.log=[];save();render()};$('#imBtn').onclick=()=>$('#im').classList.toggle('hide');render()}init();</script></body></html>
