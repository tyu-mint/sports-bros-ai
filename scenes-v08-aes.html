<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>场景模式 AES 解锁入口</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #0f0f12;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }
    html { overflow-y: auto; }
    body { overflow-y: auto; }
    body.in-frame { overflow: hidden; }
    button, input { font: inherit; }
    .hide { display: none !important; }
    .screen {
      width: 100%;
      min-height: 100dvh;
      display: block;
      padding: calc(22px + env(safe-area-inset-top)) 22px calc(160px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 30% 20%, #27272a 0, transparent 32%),
        radial-gradient(circle at 80% 90%, #18181b 0, transparent 30%),
        #0f0f12;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 24px 80px #0008;
      margin: 0 auto;
    }
    .head { padding: 28px; background: #09090b; }
    .head h1 { margin: 0; font-size: 28px; letter-spacing: .02em; }
    .head p { color: #a1a1aa; line-height: 1.7; margin: 10px 0 0; }
    .body { padding: 22px; display: grid; gap: 14px; }
    label span { display: block; margin-bottom: 8px; color: #d4d4d8; font-weight: 800; font-size: 14px; }
    input {
      width: 100%;
      border: 1px solid #3f3f46;
      background: #09090b;
      color: #f4f4f5;
      border-radius: 18px;
      padding: 13px 15px;
      outline: 0;
    }
    .btn {
      border: 1px solid #3f3f46;
      background: #27272a;
      color: #f4f4f5;
      border-radius: 16px;
      padding: 10px 14px;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
    }
    .circle-btn {
      width: 78px;
      height: 78px;
      border-radius: 999px;
      border: 1px solid #f4f4f5;
      background: #f4f4f5;
      color: #09090b;
      display: grid;
      place-items: center;
      font-size: 38px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 20px 60px #0006;
    }
    .entry-actions { display: grid; place-items: center; gap: 14px; padding-top: 8px; }
    .quiet { color: #a1a1aa; font-size: 13px; line-height: 1.55; text-align: center; }
    .box {
      border: 1px solid #3f3f46;
      background: #09090b;
      border-radius: 20px;
      padding: 14px;
      line-height: 1.7;
      color: #d4d4d8;
      word-break: break-word;
    }
    .error { color: #fecaca; min-height: 20px; text-align: center; }
    .frame-wrap { width: 100vw; height: 100dvh; overflow: hidden; background: #0f0f12; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    @media (max-width: 720px) {
      .screen {
        min-height: 100dvh;
        padding: calc(14px + env(safe-area-inset-top)) 14px calc(220px + env(safe-area-inset-bottom));
      }
      .card { margin: 0 auto; border-radius: 24px; }
      .head { padding: 22px; }
      .head h1 { font-size: 25px; }
      .head p { font-size: 16px; }
      .body { padding: 18px; }
      .circle-btn { width: 74px; height: 74px; }
    }
  </style>
</head>
<body>
  <section id="entry" class="screen">
    <div class="card">
      <div class="head">
        <h1>场景模式</h1>
        <p>输入您的 AES 密码。解锁后会把密文内容作为 API Key，并自动进入。</p>
      </div>

      <div class="body">
        <div class="box">
          已内置 AES 密文。明文不会写入 HTML。<br>
          这里默认使用 CryptoJS/OpenSSL Salted AES 格式解密。
        </div>

        <label><span>解锁密码</span><input id="password" type="password" autocomplete="current-password" /></label>
        <label><span>Endpoint</span><input id="endpoint" value="https://api.deepseek.com" /></label>
        <label><span>Main Model</span><input id="model" value="deepseek-chat" /></label>
        <label><span>Router Model</span><input id="routerModel" value="deepseek-chat" /></label>
        <label><span>Deep Model</span><input id="deepModel" value="" /></label>

        <div id="error" class="error"></div>

        <div class="entry-actions">
          <button id="guide" class="circle-btn" type="button">›</button>
          <button id="direct" class="btn" type="button">直接进入场景</button>
          <div class="quiet">圆形按钮进入对话式向导。您可以通过几轮对话生成配置，生成后继续通过对话修改。</div>
        </div>
      </div>
    </div>
  </section>

  <section id="frameWrap" class="frame-wrap hide">
    <iframe id="sceneFrame" src="about:blank"></iframe>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script>
    const EMBEDDED_AES_BLOB = "U2FsdGVkX189gjORjQI6cGoyNd2JU2fqfzKLD7RV5tL2ATiqyIBb+0PfAa4I5pDVQ5ZYYRaH/qmNlubm8YxbWQ==";

    const STABLE_CONFIG_KEY = "sports-bros-api-config";
    const CONFIG_KEYS = [
      "sports-bros-scene-config-v07",
      "sports-bros-scene-config-v06",
      "sports-bros-scene-config-v05",
      "sports-bros-scene-config-v04",
      "sports-bros-cfg-v063",
      "sports-bros-cfg-v062",
      "sports-bros-cfg-v060"
    ];

    function $(selector) { return document.querySelector(selector); }
    function setError(text) { $("#error").textContent = text || ""; }

    function decryptKey() {
      const password = $("#password").value;
      if (!password) throw new Error("请输入密码");
      if (!window.CryptoJS) throw new Error("CryptoJS 未加载，请检查网络或 CDN");
      const bytes = CryptoJS.AES.decrypt(EMBEDDED_AES_BLOB, password);
      const key = bytes.toString(CryptoJS.enc.Utf8).trim();
      if (!key) throw new Error("解锁失败：密码不对或密文格式不匹配");
      return key;
    }

    function buildConfig(key) {
      return {
        endpoint: $("#endpoint").value.trim() || "https://api.deepseek.com",
        key,
        model: $("#model").value.trim() || "deepseek-chat",
        routerModel: $("#routerModel").value.trim() || $("#model").value.trim() || "deepseek-chat",
        deepModel: $("#deepModel").value.trim()
      };
    }

    function writeConfig(cfg) {
      localStorage.setItem(STABLE_CONFIG_KEY, JSON.stringify(cfg));
      CONFIG_KEYS.forEach(key => localStorage.setItem(key, JSON.stringify(cfg)));
    }

    function enter(mode) {
      try {
        setError("");
        const apiKey = decryptKey();
        writeConfig(buildConfig(apiKey));
        document.body.classList.add("in-frame");
        $("#entry").classList.add("hide");
        $("#frameWrap").classList.remove("hide");
        $("#sceneFrame").src = mode === "direct"
          ? "./scenes-v04.html?v=aes-direct-" + Date.now()
          : "./scenes-v10.html?v=aes-guide-" + Date.now();
      } catch (error) {
        setError(error.message || "解锁失败");
      }
    }

    $("#guide").onclick = () => enter("guide");
    $("#direct").onclick = () => enter("direct");
    $("#password").addEventListener("keydown", event => {
      if (event.key === "Enter") enter("guide");
    });
  </script>
</body>
</html>
