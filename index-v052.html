<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>今晚打不打球 v0.5.2</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f4f5;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    button, input, textarea { font: inherit; }
    .hide { display: none !important; }

    .setup {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px #0002;
    }

    .head {
      background: #111;
      color: #fff;
      padding: 24px;
    }

    .head h1 { margin: 0; }
    .head p { color: #ccc; line-height: 1.6; }

    .form {
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    label { font-weight: 700; }

    input, textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 12px;
      outline: 0;
      background: #fff;
    }

    .btn {
      border: 1px solid #ddd;
      border-radius: 14px;
      background: #fff;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .pri {
      background: #111 !important;
      color: #fff !important;
      border-color: #111 !important;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      display: flex;
      overflow: hidden;
    }

    .side {
      width: 390px;
      max-width: 100vw;
      background: #fff;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-head {
      padding: 16px;
      border-bottom: 1px solid #ddd;
      flex-shrink: 0;
    }

    .side-head h1 {
      margin: 0;
      font-size: 34px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .threads {
      padding: 8px;
      overflow: auto;
      flex: 1;
    }

    .thread {
      width: 100%;
      border: 0;
      background: #fff;
      border-radius: 20px;
      padding: 12px;
      display: flex;
      gap: 12px;
      text-align: left;
      align-items: center;
    }

    .thread.active, .thread:hover { background: #eee; }

    .avatar {
      width: 46px;
      height: 46px;
      min-width: 46px;
      border-radius: 17px;
      background: #111;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thread-meta {
      min-width: 0;
      flex: 1;
    }

    .thread-name {
      font-weight: 900;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview {
      font-size: 14px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat {
      flex: 1;
      min-width: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #f4f4f5;
    }

    .topbar {
      min-height: 64px;
      border-bottom: 1px solid #ddd;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 8px;
      flex-shrink: 0;
    }

    .top-left {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .top-title {
      min-width: 0;
    }

    .chat-name {
      font-weight: 900;
      font-size: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .messages {
      flex: 1;
      overflow: auto;
      padding: 14px 10px;
      background: #f4f4f5;
    }

    .inner {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hint {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 13px 16px;
      color: #555;
      line-height: 1.65;
      max-width: 100%;
      overflow-wrap: anywhere;
      font-size: 16px;
    }

    .row {
      width: 100%;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .row.me {
      justify-content: flex-end;
    }

    .message-col {
      max-width: min(76%, 620px);
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .row.me .message-col {
      align-items: flex-end;
    }

    .sender {
      font-size: 13px;
      color: #666;
      margin: 0 0 4px 4px;
    }

    .bubble {
      max-width: 100%;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 22px 22px 22px 7px;
      padding: 10px 14px;
      white-space: pre-wrap;
      line-height: 1.6;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 17px;
    }

    .row.me .bubble {
      background: #111;
      color: #fff;
      border-color: #111;
      border-radius: 22px 22px 7px 22px;
    }

    .edited {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }

    .coach-card {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #451a03;
      border-radius: 22px;
      padding: 14px 16px;
      line-height: 1.65;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 16px;
    }

    .coach-card b {
      display: block;
      margin-bottom: 6px;
    }

    .coach-card pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: inherit;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .composer {
      border-top: 1px solid #ddd;
      background: #fff;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .composer-form {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    .composer-form input {
      border-radius: 999px;
    }

    .send {
      width: 50px;
      min-width: 50px;
      border-radius: 999px;
    }

    .mask {
      position: fixed;
      inset: 0;
      background: #0006;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 22px;
      padding: 16px;
      max-height: 88dvh;
      overflow: auto;
    }

    .modal h3 { margin: 0 0 12px; }
    .modal textarea { min-height: 130px; resize: vertical; }

    .modal-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
    }

    .error {
      color: #b91c1c;
      padding: 6px 14px;
      background: #fff;
    }

    .back { display: none; }

    @media (max-width: 760px) {
      .app { display: block; }
      .side { width: 100%; height: 100dvh; border-right: 0; }
      .chat {
        position: fixed;
        inset: 0;
        transform: translateX(100%);
        transition: .18s;
        z-index: 5;
      }
      .chat.open { transform: translateX(0); }
      .back { display: inline-block; }
      .top-buttons .optional { display: none; }
      .message-col { max-width: 72%; }
      .avatar { width: 42px; height: 42px; min-width: 42px; }
      .btn { font-size: 16px; padding: 10px 12px; }
    }
  </style>
</head>
<body>
  <section id="setup" class="setup">
    <div class="card">
      <div class="head">
        <h1>今晚打不打球</h1>
        <p>v0.5.2：修复手机聊天宽度、教练气泡、长文本换行。</p>
      </div>
      <form id="setupForm" class="form">
        <label>Endpoint<input id="endpoint" value="https://api.deepseek.com" /></label>
        <label>API Key<input id="apiKey" type="password" placeholder="sk-..." /></label>
        <label>Model<input id="model" value="deepseek-chat" /></label>
        <button class="btn pri">进入 IM</button>
      </form>
    </div>
  </section>

  <section id="app" class="app hide">
    <aside class="side">
      <div class="side-head">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
          <div style="min-width:0">
            <h1>消息</h1>
            <div id="sideSub" class="preview"></div>
          </div>
          <button id="resetCfg" class="btn">配置</button>
        </div>
        <div class="toolbar">
          <button id="profile" class="btn">资料</button>
          <button id="backup" class="btn">备份</button>
          <button id="importBtn" class="btn">导入</button>
          <button id="editToggle" class="btn">编辑关</button>
          <input id="file" type="file" accept="application/json" class="hide" />
        </div>
      </div>
      <div id="threads" class="threads"></div>
    </aside>

    <main id="chat" class="chat">
      <header class="topbar">
        <div class="top-left">
          <button id="back" class="btn back">‹</button>
          <div id="chatAv" class="avatar">群</div>
          <div class="top-title">
            <div id="chatName" class="chat-name"></div>
            <div id="chatSub" class="preview"></div>
          </div>
        </div>
        <div class="top-buttons">
          <button id="coach" class="btn">教练</button>
          <button id="remark" class="btn">备注</button>
          <button id="regen" class="btn optional">改最后并重生</button>
          <button id="clear" class="btn optional">清空</button>
        </div>
      </header>

      <section class="messages">
        <div class="inner">
          <div id="hint" class="hint"></div>
          <div id="list" class="inner"></div>
          <div id="typing" class="row hide">
            <div class="avatar">…</div>
            <div class="bubble">生成中...</div>
          </div>
          <div id="anchor"></div>
        </div>
      </section>

      <div id="err" class="error"></div>

      <footer class="composer">
        <form id="chatForm" class="composer-form">
          <input id="input" placeholder="发消息..." />
          <button class="btn pri send">➤</button>
        </form>
      </footer>
    </main>
  </section>

  <div id="mask" class="mask hide">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button id="deleteMsg" class="btn">删除</button>
        <div>
          <button id="cancel" class="btn">取消</button>
          <button id="save" class="btn pri">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CFG_KEY = 'sports-bros-cfg-v052';
    const STATE_KEY = 'sports-bros-state-v052';

    const agents = [
      {
        id: 'zhouye', name: '周野', tag: '篮球队', av: '周',
        sys: '你叫周野，22岁，篮球队，外向，像群里的组织者。你把用户当兄弟。短句，直接，爱喊吃饭打球。不要暧昧，不要乙游。'
      },
      {
        id: 'chenxiao', name: '陈骁', tag: '足球队', av: '陈',
        sys: '你叫陈骁，22岁，足球队，嘴欠损友。你把用户当兄弟。爱吐槽起哄但没有恶意。不要攻击真实痛点。'
      },
      {
        id: 'linchuan', name: '林川', tag: '田径队', av: '林',
        sys: '你叫林川，23岁，田径队，话少，行动派。你把用户当兄弟。关心直接，常说吃没、下来走走、我顺路。不要大段开导。'
      },
      {
        id: 'zhaokai', name: '赵恺', tag: '健身房', av: '赵',
        sys: '你叫赵恺，22岁，常年健身，自律。你把用户当兄弟。经常催吃饭喝水睡觉，语气直接靠谱。'
      },
      {
        id: 'ahang', name: '阿航', tag: '游泳队', av: '航',
        sys: '你叫阿航，21岁，游泳队，阳光话多爱接梗。你把用户当兄弟，负责把聊天变热闹。'
      }
    ];

    const threads = [
      { id: 'group', type: 'group', name: '今晚打不打球', tag: '置顶群聊', av: '群' },
      ...agents.map(agent => ({ ...agent, type: 'agent' })),
      { id: 'coach', type: 'coach', name: '兄弟相处教练', tag: '私下建议', av: '教' }
    ];

    let cfg = null;
    let active = 'group';
    let editing = null;
    let modalMode = '';
    let loading = false;

    function makeMessage(role, sender, content) {
      return {
        id: String(Date.now()) + Math.random().toString(36).slice(2),
        role,
        sender,
        content,
        ts: Date.now()
      };
    }

    function defaultState() {
      return {
        prefs: { name: '我', avatar: '我', avatarUrl: '', edit: false, remarks: {} },
        conv: {
          group: [
            makeMessage('assistant', '周野', '进群了啊。以后这就是「今晚打不打球」。'),
            makeMessage('assistant', '陈骁', '先说好，进群了就别装高冷。'),
            makeMessage('assistant', '阿航', '晚上吃不吃夜宵，先投票。')
          ],
          zhouye: [makeMessage('assistant', '周野', '有事直接说。刚练完，手机在手。')],
          chenxiao: [makeMessage('assistant', '陈骁', '咋了，又来找我唠嗑？')],
          linchuan: [makeMessage('assistant', '林川', '嗯，我在。')],
          zhaokai: [makeMessage('assistant', '赵恺', '先问一句，今天吃饭没。')],
          ahang: [makeMessage('assistant', '阿航', '你来得正好，我刚想找人说话。')],
          coach: []
        },
        coachVisible: false
      };
    }

    let state = defaultState();

    function $(selector) { return document.querySelector(selector); }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function saveState() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    function getConversation(id = active) {
      if (!state.conv[id]) state.conv[id] = [];
      return state.conv[id];
    }

    function getThread(id = active) {
      return threads.find(thread => thread.id === id) || threads[0];
    }

    function getAgent(id) {
      return agents.find(agent => agent.id === id);
    }

    function displayName(thread) {
      return thread.type === 'agent'
        ? (state.prefs.remarks[thread.id] || thread.name)
        : thread.name;
    }

    function senderName(name) {
      const agent = agents.find(item => item.name === name);
      return agent ? (state.prefs.remarks[agent.id] || agent.name) : name;
    }

    function avatarHtml() {
      if (state.prefs.avatarUrl) return `<img src="${escapeHtml(state.prefs.avatarUrl)}">`;
      return escapeHtml((state.prefs.avatar || state.prefs.name || '我').slice(0, 2));
    }

    function apiUrl() {
      const endpoint = cfg.endpoint.trim().replace(/\/$/, '');
      if (endpoint.endsWith('/chat/completions')) return endpoint;
      if (endpoint.endsWith('/v1')) return `${endpoint}/chat/completions`;
      return `${endpoint}/v1/chat/completions`;
    }

    async function callLLM(messages, temperature = 0.85) {
      const response = await fetch(apiUrl(), {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${cfg.key}`
        },
        body: JSON.stringify({
          model: cfg.model,
          messages,
          temperature,
          stream: false
        })
      });

      const text = await response.text();
      let data = {};
      try { data = JSON.parse(text); } catch {}

      if (!response.ok) throw new Error((data.error && data.error.message) || text);
      return data.choices[0].message.content.trim();
    }

    function recentMessages(id) {
      return getConversation(id)
        .filter(message => message.role !== 'coach')
        .slice(-16)
        .map(message => ({
          role: message.role === 'user' ? 'user' : 'assistant',
          content: `${message.sender === '我' ? state.prefs.name : message.sender}：${message.content}`
        }));
    }

    function groupPrompt() {
      return `你在模拟中文IM兄弟群。用户叫${state.prefs.name}。用户是群里兄弟，不是恋爱对象。成员：周野篮球队组织者；陈骁足球队嘴欠损友；林川田径队话少行动派；赵恺健身自律；阿航游泳队阳光话多。每次回复2到4条，格式“角色名：消息”。短句口语，可以互相插话，不写小说旁白，不替用户说话，不暧昧。`;
    }

    function singlePrompt(agent) {
      return `${agent.sys}\n当前是一对一私聊。用户叫${state.prefs.name}。回复1到4句，像真实IM私聊。不要输出名字前缀。`;
    }

    function coachPrompt() {
      return '你是兄弟相处教练，只私下帮助用户学习如何和直男体育生兄弟自然相处。请必须按多行输出：评分：1-10\n判断：一句话\n风险：主要问题\n改法：1. ...\n2. ...\n3. ...\n下次建议：一句话。';
    }

    function parseGroupReply(raw) {
      const parsed = [];
      raw.split(/\n+/).forEach(line => {
        const match = line.trim().match(/^([^：:]{1,8})[：:](.+)$/);
        if (match && agents.some(agent => agent.name === match[1].trim())) {
          parsed.push({ sender: match[1].trim(), content: match[2].trim() });
        }
      });
      return parsed.length ? parsed.slice(0, 5) : [{ sender: '周野', content: raw.slice(0, 200) }];
    }

    function needsCoach(text) {
      return /^\/coach/i.test(text) || ['教练', '帮我看看', '怎么回', '尴尬', '不太会', '怎么和男生'].some(key => text.includes(key));
    }

    function render() {
      const hasConfig = !!cfg;
      $('#setup').classList.toggle('hide', hasConfig);
      $('#app').classList.toggle('hide', !hasConfig);
      if (!hasConfig) return;

      $('#sideSub').textContent = `${cfg.model} · ${state.prefs.name}`;
      $('#editToggle').textContent = state.prefs.edit ? '编辑开' : '编辑关';
      $('#editToggle').classList.toggle('pri', state.prefs.edit);

      const visibleThreads = threads.filter(thread => thread.id !== 'coach' || state.coachVisible || getConversation('coach').length);
      $('#threads').innerHTML = visibleThreads.map(thread => {
        const last = getConversation(thread.id).slice(-1)[0];
        const preview = last
          ? `${last.sender === '我' ? state.prefs.name : senderName(last.sender)}：${last.content}`
          : thread.tag;

        return `
          <button class="thread ${active === thread.id ? 'active' : ''}" data-id="${thread.id}">
            <div class="avatar">${escapeHtml(thread.av)}</div>
            <div class="thread-meta">
              <div class="thread-name">${escapeHtml(displayName(thread))}</div>
              <div class="preview">${escapeHtml(preview)}</div>
            </div>
          </button>
        `;
      }).join('');

      document.querySelectorAll('.thread').forEach(button => {
        button.onclick = () => {
          active = button.dataset.id;
          $('#chat').classList.add('open');
          render();
        };
      });

      const currentThread = getThread();
      $('#chatName').textContent = displayName(currentThread);
      $('#chatSub').textContent = currentThread.type === 'group' ? '置顶群聊' : currentThread.tag;
      $('#chatAv').textContent = currentThread.av;
      $('#remark').classList.toggle('hide', currentThread.type !== 'agent');
      $('#coach').classList.toggle('hide', currentThread.type === 'coach');

      $('#hint').textContent = currentThread.type === 'group'
        ? '群聊。编辑开后点消息可改上下文；“改最后并重生”会重生成最新回复。'
        : currentThread.type === 'coach'
          ? '教练区。'
          : '私聊。备注名只在本机显示。';

      $('#list').innerHTML = getConversation().map(message => {
        if (message.role === 'coach') {
          return `
            <div class="coach-card">
              <b>兄弟相处教练</b>
              <pre>${escapeHtml(message.content)}</pre>
            </div>
          `;
        }

        const isUser = message.role === 'user';
        const agent = agents.find(item => item.name === message.sender);
        const avatar = isUser ? avatarHtml() : escapeHtml(agent ? agent.av : message.sender.slice(0, 1));

        return `
          <div class="row ${isUser ? 'me' : ''}">
            ${isUser ? '' : `<div class="avatar">${avatar}</div>`}
            <div class="message-col">
              ${isUser ? '' : `<div class="sender">${escapeHtml(senderName(message.sender))}</div>`}
              <div class="bubble" data-mid="${message.id}">${escapeHtml(message.content)}</div>
              ${message.edited ? '<div class="edited">已修改</div>' : ''}
            </div>
            ${isUser ? `<div class="avatar">${avatarHtml()}</div>` : ''}
          </div>
        `;
      }).join('');

      document.querySelectorAll('[data-mid]').forEach(element => {
        element.onclick = () => {
          if (state.prefs.edit) openEdit(element.dataset.mid, 'edit');
        };
      });

      $('#typing').classList.toggle('hide', !loading);
      $('#anchor').scrollIntoView({ block: 'end' });
    }

    function showError(message) {
      $('#err').textContent = message || '';
    }

    async function generateReply(id) {
      const currentThread = getThread(id);
      loading = true;
      render();

      try {
        if (currentThread.type === 'group') {
          const raw = await callLLM([{ role: 'system', content: groupPrompt() }, ...recentMessages('group')], 0.9);
          parseGroupReply(raw).forEach(reply => {
            getConversation('group').push(makeMessage('assistant', reply.sender, reply.content));
          });
        } else if (currentThread.type === 'agent') {
          const currentAgent = getAgent(id);
          const raw = await callLLM([{ role: 'system', content: singlePrompt(currentAgent) }, ...recentMessages(id)], 0.86);
          getConversation(id).push(makeMessage('assistant', currentAgent.name, raw));
        }
        saveState();
      } catch (error) {
        showError(error.message);
      } finally {
        loading = false;
        render();
      }
    }

    async function sendMessage(text) {
      if (!text || loading) return;
      showError('');

      const id = active;
      getConversation(id).push(makeMessage('user', '我', text));
      saveState();
      render();

      try {
        if (id !== 'coach' && needsCoach(text)) {
          state.coachVisible = true;
          active = 'coach';
          getConversation('coach').push(makeMessage('user', '我', text));
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, { role: 'user', content: text }], 0.45);
          getConversation('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState();
          render();
          return;
        }

        if (getThread(id).type === 'coach') {
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, ...recentMessages('coach')], 0.45);
          getConversation('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState();
          render();
          return;
        }

        await generateReply(id);
      } catch (error) {
        showError(error.message);
      }
    }

    function openModal(title, html, mode) {
      modalMode = mode;
      $('#modalTitle').textContent = title;
      $('#modalBody').innerHTML = html;
      $('#deleteMsg').classList.toggle('hide', mode !== 'edit');
      $('#mask').classList.remove('hide');
    }

    function closeModal() {
      $('#mask').classList.add('hide');
      editing = null;
    }

    function openEdit(messageId, mode) {
      const conversation = getConversation();
      const index = conversation.findIndex(message => message.id === messageId);
      if (index < 0 || conversation[index].role === 'coach') return;

      editing = { id: messageId, mode };
      openModal(
        mode === 'regen' ? '修改最后一句并重生' : '修改消息',
        `<textarea id="editText">${escapeHtml(conversation[index].content)}</textarea><small>保存后会修改上下文。</small>`,
        mode
      );
    }

    function saveModal() {
      if (modalMode === 'profile') {
        state.prefs.name = $('#pname').value.trim() || '我';
        state.prefs.avatar = $('#pav').value.trim() || '我';
        state.prefs.avatarUrl = $('#purl').value.trim();
        saveState();
        closeModal();
        render();
        return;
      }

      if (modalMode === 'remark') {
        state.prefs.remarks[active] = $('#rname').value.trim();
        saveState();
        closeModal();
        render();
        return;
      }

      const conversation = getConversation();
      const index = conversation.findIndex(message => message.id === editing.id);
      const value = $('#editText').value.trim();

      if (index >= 0 && value) {
        conversation[index].content = value;
        conversation[index].edited = true;

        if (editing.mode === 'regen') {
          conversation.splice(index + 1);
          saveState();
          closeModal();
          generateReply(active);
          return;
        }
        saveState();
      }

      closeModal();
      render();
    }

    function deleteMessage() {
      const conversation = getConversation();
      const index = conversation.findIndex(message => message.id === (editing && editing.id));
      if (index >= 0) conversation.splice(index, 1);
      saveState();
      closeModal();
      render();
    }

    function openProfile() {
      openModal(
        '个人资料',
        `<label>名称<input id="pname" value="${escapeHtml(state.prefs.name)}"></label><label>文字头像<input id="pav" value="${escapeHtml(state.prefs.avatar)}"></label><label>头像URL/Base64<input id="purl" value="${escapeHtml(state.prefs.avatarUrl)}"></label>`,
        'profile'
      );
    }

    function openRemark() {
      openModal(
        '备注名',
        `<label>备注名<input id="rname" value="${escapeHtml(state.prefs.remarks[active] || '')}"></label><small>仅本机显示。</small>`,
        'remark'
      );
    }

    function regenerateLastUserMessage() {
      const conversation = getConversation();
      for (let index = conversation.length - 1; index >= 0; index--) {
        if (conversation[index].role === 'user') {
          openEdit(conversation[index].id, 'regen');
          return;
        }
      }
      showError('当前会话没有你的消息');
    }

    function backup() {
      const blob = new Blob([JSON.stringify({ version: 'v0.5.2', state }, null, 2)], { type: 'application/json' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'sports-bros-backup-v052.json';
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function importBackup(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (data.state) {
            state = data.state;
            saveState();
            render();
          } else {
            showError('格式不对');
          }
        } catch (error) {
          showError(error.message);
        }
      };
      reader.readAsText(file);
    }

    function init() {
      try {
        cfg = JSON.parse(localStorage.getItem(CFG_KEY) || 'null');
        const saved = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
        if (saved) {
          const base = defaultState();
          state = {
            ...base,
            ...saved,
            prefs: { ...base.prefs, ...(saved.prefs || {}) },
            conv: { ...base.conv, ...(saved.conv || {}) }
          };
        }
      } catch {}

      $('#setupForm').onsubmit = event => {
        event.preventDefault();
        cfg = {
          endpoint: $('#endpoint').value.trim(),
          key: $('#apiKey').value.trim(),
          model: $('#model').value.trim()
        };
        localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
        render();
      };

      $('#resetCfg').onclick = () => {
        localStorage.removeItem(CFG_KEY);
        cfg = null;
        render();
      };

      $('#chatForm').onsubmit = event => {
        event.preventDefault();
        const value = $('#input').value.trim();
        $('#input').value = '';
        sendMessage(value);
      };

      $('#back').onclick = () => $('#chat').classList.remove('open');
      $('#profile').onclick = openProfile;
      $('#remark').onclick = openRemark;
      $('#regen').onclick = regenerateLastUserMessage;
      $('#backup').onclick = backup;
      $('#importBtn').onclick = () => $('#file').click();
      $('#file').onchange = event => { if (event.target.files[0]) importBackup(event.target.files[0]); };
      $('#editToggle').onclick = () => { state.prefs.edit = !state.prefs.edit; saveState(); render(); };
      $('#coach').onclick = () => { state.coachVisible = true; active = 'coach'; $('#chat').classList.add('open'); render(); };
      $('#clear').onclick = () => { getConversation(active).length = 0; saveState(); render(); };
      $('#cancel').onclick = closeModal;
      $('#save').onclick = saveModal;
      $('#deleteMsg').onclick = deleteMessage;
      $('#mask').onclick = event => { if (event.target.id === 'mask') closeModal(); };

      render();
    }

    init();
  </script>
</body>
</html>
