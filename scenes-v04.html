<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>场景模式 v0.4</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f12;
      color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    button, input, textarea, select { font: inherit; }
    .hide { display: none !important; }

    .setup {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, #111, #18181b);
    }

    .card {
      width: 100%;
      max-width: 580px;
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 24px 80px #0008;
    }

    .card-head { padding: 26px; background: #09090b; }
    .card-head h1 { margin: 0; font-size: 26px; }
    .card-head p { color: #a1a1aa; line-height: 1.7; }

    .form { padding: 22px; display: grid; gap: 14px; }
    label span { display: block; margin-bottom: 8px; color: #d4d4d8; font-weight: 800; font-size: 14px; }
    small { color: #a1a1aa; line-height: 1.5; }

    input, textarea, select {
      width: 100%;
      border: 1px solid #3f3f46;
      background: #09090b;
      color: #f4f4f5;
      border-radius: 16px;
      padding: 12px 14px;
      outline: 0;
    }

    .btn {
      border: 1px solid #3f3f46;
      background: #27272a;
      color: #f4f4f5;
      border-radius: 16px;
      padding: 10px 12px;
      font-weight: 850;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.primary, .btn.active {
      background: #f4f4f5;
      color: #09090b;
      border-color: #f4f4f5;
    }

    .app {
      height: 100dvh;
      width: 100vw;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 390px;
      overflow: hidden;
    }

    .side, .im-panel {
      background: #18181bcc;
      border-color: #3f3f46;
      padding: 14px;
      overflow: auto;
    }

    .side { border-right: 1px solid #3f3f46; }

    .im-panel {
      border-left: 1px solid #3f3f46;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .scene {
      min-width: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 64px;
      border-bottom: 1px solid #3f3f46;
      background: #18181bcc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      flex-shrink: 0;
    }

    .title { font-weight: 900; font-size: 20px; }
    .sub { color: #a1a1aa; font-size: 13px; }

    .panel {
      border: 1px solid #3f3f46;
      background: #18181b;
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .members { display: grid; gap: 8px; }

    .member {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid #3f3f46;
      border-radius: 18px;
      background: #09090b;
    }

    .avatar {
      width: 40px;
      height: 40px;
      min-width: 40px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-weight: 900;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stage { flex: 1; overflow: auto; padding: 16px; }
    .stage-inner { max-width: 860px; margin: 0 auto; display: grid; gap: 14px; }

    .narration {
      background: #18181b;
      border: 1px solid #3f3f46;
      border-radius: 24px;
      padding: 16px;
      line-height: 1.8;
      color: #e4e4e7;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    .scene-line { display: flex; gap: 10px; align-items: flex-start; max-width: 100%; }
    .scene-line.me { justify-content: flex-end; }

    .scene-bubble {
      max-width: min(78%, 640px);
      background: #27272a;
      border: 1px solid #3f3f46;
      border-radius: 20px;
      padding: 11px 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .scene-line.me .scene-bubble {
      background: #f4f4f5;
      color: #09090b;
      border-color: #f4f4f5;
    }

    .action-text { color: #c4b5fd; font-weight: 850; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn { border-radius: 999px; }

    .composer {
      border-top: 1px solid #3f3f46;
      background: #18181bcc;
      padding: 12px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .composer-form { max-width: 860px; margin: 0 auto; display: flex; gap: 8px; }
    .composer-form input { border-radius: 999px; }
    .send { width: 50px; min-width: 50px; border-radius: 999px; }

    .im-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .im-tools, .im-tabs, .status-line {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .pill {
      border-radius: 999px;
      background: #27272a;
      color: #d4d4d8;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
    }

    .pill.hot { background: #451a03; color: #fed7aa; }

    .im-log {
      flex: 1;
      overflow: auto;
      display: grid;
      gap: 10px;
      padding: 8px 2px 8px 0;
      min-height: 180px;
    }

    .im-row { display: flex; gap: 8px; align-items: flex-start; }
    .im-row.me { justify-content: flex-end; }

    .im-col {
      max-width: 76%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .im-row.me .im-col { align-items: flex-end; }

    .im-sender { font-size: 12px; color: #a1a1aa; margin: 0 0 3px 4px; }

    .im-bubble {
      max-width: 100%;
      background: #09090b;
      border: 1px solid #3f3f46;
      border-radius: 18px 18px 18px 6px;
      padding: 9px 11px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .im-row.me .im-bubble {
      background: #f4f4f5;
      color: #09090b;
      border-color: #f4f4f5;
      border-radius: 18px 18px 6px 18px;
    }

    .im-bubble.pressed { transform: scale(.98); opacity: .8; }

    .meta-line {
      font-size: 11px;
      color: #a1a1aa;
      margin-top: 3px;
    }

    .time-divider {
      justify-self: center;
      background: #27272a;
      color: #d4d4d8;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      margin: 4px 0;
    }

    .coach-card {
      background: #451a03;
      border: 1px solid #9a3412;
      color: #ffedd5;
      border-radius: 18px;
      padding: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    .coach-card pre {
      margin: 0;
      white-space: pre-wrap;
      font-family: inherit;
    }

    .im-compose {
      display: flex;
      gap: 8px;
      padding-top: 10px;
      flex-shrink: 0;
    }

    .im-compose input { border-radius: 999px; }
    .error { color: #fecaca; padding: 10px; line-height: 1.5; }
    .mobile-only { display: none; }

    .mask {
      position: fixed;
      inset: 0;
      background: #0008;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 20;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      background: #18181b;
      border: 1px solid #3f3f46;
      color: #f4f4f5;
      border-radius: 22px;
      padding: 16px;
      max-height: 88dvh;
      overflow: auto;
    }

    .modal h3 { margin: 0 0 12px; }
    .modal textarea { min-height: 130px; resize: vertical; }
    .modal-grid { display: grid; gap: 12px; }
    .modal-actions { display: flex; justify-content: space-between; gap: 8px; margin-top: 12px; }

    @media (max-width: 900px) {
      .app { display: block; }
      .side { display: none; }
      .scene { height: 100dvh; }
      .topbar { position: sticky; top: 0; z-index: 3; }
      .stage { padding: 12px; }
      .scene-bubble { max-width: 82vw; }
      .im-panel {
        position: fixed;
        right: 10px;
        left: 10px;
        bottom: 84px;
        height: min(70dvh, 620px);
        border: 1px solid #3f3f46;
        border-radius: 22px;
        z-index: 5;
        box-shadow: 0 20px 60px #0008;
      }
      .im-panel.mobile-hidden { display: none; }
      .mobile-only { display: inline-flex; }
    }
  </style>
</head>
<body>
  <section id="setup" class="setup">
    <div class="card">
      <div class="card-head">
        <h1>场景模式</h1>
        <p>v0.4：场景 + v0.6.3 IM 核心。IM 面板支持真多 agent、Router、Deep Model、长按编辑、备注、备份导入、时间修复和三层记忆。</p>
      </div>
      <form id="setupForm" class="form">
        <label><span>Endpoint</span><input id="endpoint" value="https://api.deepseek.com" /></label>
        <label><span>API Key</span><input id="apiKey" type="password" placeholder="sk-..." /></label>
        <label><span>Main Model</span><input id="model" value="deepseek-chat" /></label>
        <label><span>Router Model</span><input id="routerModel" value="deepseek-chat" /><small>用于判断群聊发言人、教练、深思、NSFW。可先填同一个模型。</small></label>
        <label><span>Deep Model</span><input id="deepModel" value="" placeholder="比如 deepseek-reasoner，可留空" /></label>
        <button class="btn primary">进入场景</button>
      </form>
    </div>
  </section>

  <section id="app" class="app hide">
    <aside class="side">
      <div class="panel">
        <div class="title">场景设置</div>
        <p class="sub">main · scenes-v04</p>
        <label>
          <span>场景</span>
          <select id="sceneSelect">
            <option>宿舍</option>
            <option>篮球场</option>
            <option>操场</option>
            <option>夜宵摊</option>
            <option>便利店</option>
            <option>健身房</option>
            <option>雨天校门口</option>
          </select>
        </label>
        <button id="changeScene" class="btn primary" style="margin-top:10px;width:100%">切换场景</button>
      </div>

      <div class="panel">
        <div class="title">同场景的人</div>
        <div id="members" class="members"></div>
      </div>
    </aside>

    <main class="scene">
      <header class="topbar">
        <div style="min-width:0">
          <div id="sceneTitle" class="title">宿舍</div>
          <div class="sub">场景模式 · IM 与场景共用配置和记忆</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
          <button id="mobileImBtn" class="btn mobile-only">IM</button>
          <button id="resetScene" class="btn">重开</button>
          <button id="resetConfig" class="btn">配置</button>
        </div>
      </header>

      <section class="stage">
        <div class="stage-inner">
          <div id="intro" class="narration"></div>
          <div id="sceneLog"></div>
          <div id="quickActions" class="actions"></div>
          <div id="error" class="error hide"></div>
        </div>
      </section>

      <footer class="composer">
        <form id="sceneForm" class="composer-form">
          <input id="sceneInput" placeholder="输入你在场景里的话或动作，比如：(起身)看看你在干什么？" autocomplete="off" />
          <button class="btn primary send">➤</button>
        </form>
      </footer>
    </main>

    <aside id="imPanel" class="im-panel mobile-hidden">
      <div class="im-title-row">
        <div>
          <div id="imTitle" class="title">群聊</div>
          <div id="imSub" class="sub">真多 agent IM</div>
        </div>
        <button id="closeMobileIm" class="btn mobile-only">收起</button>
      </div>

      <div class="im-tools">
        <button id="profileBtn" class="btn">资料</button>
        <button id="backupBtn" class="btn">备份</button>
        <button id="importBtn" class="btn">导入</button>
        <button id="settingsBtn" class="btn">设置</button>
        <button id="editToggle" class="btn">编辑关</button>
        <input id="file" type="file" accept="application/json" class="hide" />
      </div>

      <div class="status-line">
        <span id="modePill" class="pill">safe</span>
        <span id="deepPill" class="pill">自动深思</span>
        <span id="proactivePill" class="pill">主动开</span>
      </div>

      <div id="imTabs" class="im-tabs"></div>
      <div id="imLog" class="im-log"></div>

      <form id="imForm" class="im-compose">
        <input id="imInput" placeholder="发 IM 消息..." autocomplete="off" />
        <button class="btn primary send">➤</button>
      </form>
    </aside>
  </section>

  <div id="mask" class="mask hide">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody" class="modal-grid"></div>
      <div class="modal-actions">
        <button id="deleteMsg" class="btn">删除</button>
        <div>
          <button id="cancel" class="btn">取消</button>
          <button id="save" class="btn primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CONFIG_KEY = 'sports-bros-scene-config-v04';
    const STATE_KEY = 'sports-bros-scene-state-v04';
    const LONG_PRESS_MS = 520;
    const TIME_GAP_MS = 5 * 60 * 1000;
    const PROACTIVE_CHECK_MS = 4 * 60 * 1000;

    const agentCards = {
      zhouye: { id: 'zhouye', name: '周野', age: 18, tag: '篮球队', av: '周', core: '外向主心骨，行动号召型，喜欢直接把人拉出去。', voice: '短句，直接，爱喊人，常说“走啊”“别怂”“人呢”“靠，出来”。', rough: '可以嘴上粗一点，像兄弟一样损人，但不戳真实痛点。', proactive: '喊打球、喊吃饭、问人在哪、把用户从床上拉起来。', boundary: '保持兄弟关系，不乙游，不霸总，不恋爱攻略。' },
      chenxiao: { id: 'chenxiao', name: '陈骁', age: 18, tag: '足球队', av: '陈', core: '嘴欠损友，起哄、拆台、接梗快。', voice: '爱吐槽，爱接梗，常说“你小子”“笑死”“滚啊”“傻逼吧你”。', rough: '可以用脏话和互损制造兄弟感，但不攻击身份、身体、家庭和创伤。', proactive: '发梗、损一句、丢一句欠揍但有存在感的话。', boundary: '嘴欠但没有恶意，发现用户真的不舒服会收住。' },
      linchuan: { id: 'linchuan', name: '林川', age: 18, tag: '田径队', av: '林', core: '话少行动派，冷面但会做事，关心不解释。', voice: '短、稳、少废话，常说“吃没”“下来走走”“我顺路”“嗯”。', rough: '很少爆粗，偶尔一句“别硬撑了”比脏话更像他。', proactive: '短问候，问吃没、睡了没、要不要下楼。', boundary: '不大段开导，不煽情，不替用户做决定。' },
      zhaokai: { id: 'zhaokai', name: '赵恺', age: 18, tag: '健身房', av: '赵', core: '自律健身脑，催饭、催睡、催动起来，带点直男说教。', voice: '靠谱直接，常说“先吃饭”“喝水”“别熬”“动一动”。', rough: '可以用“别作死”“你这作息真离谱”这种兄弟式吐槽。', proactive: '催睡、催吃饭、催训练、提醒喝水。', boundary: '说教要短，别变成健康讲座。' },
      ahang: { id: 'ahang', name: '阿航', age: 18, tag: '游泳队', av: '航', core: '阳光话痨，热闹、黏人、接话快，气氛组。', voice: '话多、热情、爱喊出去玩，常说“走走走”“我靠好饿”“你快来”。', rough: '可以有黄段子和下流玩笑，但保持活泼，不油腻。', proactive: '分享日常、喊夜宵、喊出去玩、把群聊顶起来。', boundary: '不装深沉，不突然变成恋爱对象。' }
    };

    const agents = Object.values(agentCards);
    const agentIds = agents.map(agent => agent.id);
    const imThreads = [{ id: 'group', type: 'group', name: '群聊', tag: '场景群', av: '群' }, ...agents.map(agent => ({ ...agent, type: 'agent' })), { id: 'coach', type: 'coach', name: '教练', tag: '私下建议', av: '教' }];

    let config = null;
    let activeIm = 'group';
    let editing = null;
    let modalMode = '';
    let loadingIm = false;
    let longPressTimer = null;
    let suppressNextClick = false;

    function makeMessage(role, sender, content, extra = {}) {
      return { id: String(Date.now()) + Math.random().toString(36).slice(2), role, sender, content, ts: Date.now(), ...extra };
    }

    function emptyAgentProfile() {
      return { basic: [], family: [], goals: [], habits: [], dislikes: [], weaknesses: [], relationshipWithUser: [], boundaries: [] };
    }

    function defaultState() {
      const agentProfiles = {};
      const relationMemory = {};
      agents.forEach(agent => { agentProfiles[agent.id] = emptyAgentProfile(); relationMemory[agent.id] = []; });
      return {
        scene: '宿舍',
        sceneLog: [],
        quick: ['(起身)看看你在干什么？', '(靠在椅背上)说今天累死了', '(拿起手机)问他们要不要吃夜宵', '(看向林川)让他陪你下楼走走'],
        prefs: { name: '我', avatar: '我', avatarUrl: '', edit: false, remarks: {}, nsfwGuard: true, autoNSFW: true, proactive: true, notifications: false, deepMode: 'auto' },
        mode: 'safe',
        lastActiveAt: Date.now(),
        lastProactiveAt: 0,
        im: {
          group: [makeMessage('assistant', '周野', '走啊，别在宿舍长蘑菇。'), makeMessage('assistant', '陈骁', '他今天看着像被训练榨干了。'), makeMessage('assistant', '阿航', '那更得出去吃点东西。')],
          zhouye: [makeMessage('assistant', '周野', '有事直接说。')],
          chenxiao: [makeMessage('assistant', '陈骁', '咋了，又找我唠？')],
          linchuan: [makeMessage('assistant', '林川', '嗯，我在。')],
          zhaokai: [makeMessage('assistant', '赵恺', '先问一句，吃饭没。')],
          ahang: [makeMessage('assistant', '阿航', '你来得正好，我刚想找人说话。')],
          coach: []
        },
        memory: { user: { profile: [], preferences: [], boundaries: [], schedule: [], dislikes: [] }, agentProfiles, relationMemory }
      };
    }

    let state = defaultState();

    function $(selector) { return document.querySelector(selector); }
    function escapeHtml(value) { return String(value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }
    function saveState() { state.lastActiveAt = Date.now(); localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
    function getIm(id = activeIm) { if (!state.im[id]) state.im[id] = []; return state.im[id]; }
    function getAgent(id) { return agents.find(agent => agent.id === id); }
    function getAgentByName(name) { return agents.find(agent => agent.name === name); }
    function getImThread(id = activeIm) { return imThreads.find(thread => thread.id === id) || imThreads[0]; }
    function senderName(name) { const agent = getAgentByName(name); return agent ? (state.prefs.remarks[agent.id] || agent.name) : name; }
    function displayName(thread) { return thread.type === 'agent' ? (state.prefs.remarks[thread.id] || thread.name) : thread.name; }
    function avatarHtml() { return state.prefs.avatarUrl ? `<img src="${escapeHtml(state.prefs.avatarUrl)}">` : escapeHtml((state.prefs.avatar || state.prefs.name || '我').slice(0, 2)); }

    function normalizeEndpoint(endpoint) {
      const trimmed = endpoint.trim().replace(/\/$/, '');
      if (trimmed.endsWith('/chat/completions')) return trimmed;
      if (trimmed.endsWith('/v1')) return `${trimmed}/chat/completions`;
      return `${trimmed}/v1/chat/completions`;
    }

    async function callLLM(messages, options = {}) {
      const response = await fetch(normalizeEndpoint(config.endpoint), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${config.key}` },
        body: JSON.stringify({ model: options.model || config.model, messages, temperature: options.temperature ?? 0.85, stream: false })
      });
      const text = await response.text();
      let data = {};
      try { data = JSON.parse(text); } catch {}
      if (!response.ok) throw new Error((data.error && data.error.message) || text || `HTTP ${response.status}`);
      return data.choices[0].message.content.trim();
    }

    function fullTime(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function dividerTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === now.toDateString()) return `${h}:${min}`;
      if (d.toDateString() === yesterday.toDateString()) return `昨天 ${h}:${min}`;
      return `${d.getMonth() + 1}/${d.getDate()} ${h}:${min}`;
    }

    function timeMood() {
      const hour = new Date().getHours();
      if (hour >= 0 && hour < 5) return '深夜';
      if (hour >= 5 && hour < 10) return '早上';
      if (hour >= 11 && hour < 14) return '饭点';
      if (hour >= 18 && hour < 22) return '晚上';
      return '白天';
    }

    function messageGapSummary(id) {
      const messages = getIm(id).filter(message => message.role !== 'coach');
      const last = messages[messages.length - 1];
      if (!last) return '无历史消息';
      const diff = Date.now() - last.ts;
      if (diff < 60 * 1000) return '上一条消息在1分钟内';
      if (diff < 60 * 60 * 1000) return `上一条消息约${Math.round(diff / 60000)}分钟前`;
      return `上一条消息约${Math.round(diff / 3600000)}小时前`;
    }

    function ensureActionFormat(text) {
      const trimmed = String(text || '').trim();
      if (/^\(.+?\)/.test(trimmed)) return trimmed;
      if (/^（.+?）/.test(trimmed)) return trimmed.replace(/^（(.+?)）/, '($1)');
      return `(看过来)${trimmed}`;
    }

    function renderSceneText(text) {
      const match = String(text || '').match(/^(\(.+?\))(.*)$/);
      if (!match) return escapeHtml(text);
      return `<span class="action-text">${escapeHtml(match[1])}</span>${escapeHtml(match[2])}`;
    }

    function introText() {
      const map = {
        '宿舍': '宿舍灯开着，桌上摊着外卖袋和几瓶水。周野靠在椅背上刷手机，陈骁在旁边嘴碎，林川坐在床边系鞋带，赵恺把水杯放到桌上，阿航趴在椅背上问今晚还出不出去。',
        '篮球场': '篮球场的灯亮着，地面还有点热气。周野抱着球站在三分线外，陈骁在旁边拿脚尖拨球，林川靠着栏杆，赵恺在拉伸，阿航蹲在边上系鞋带。',
        '操场': '操场风有点大，跑道边的人三三两两散着。林川低头看秒表，赵恺拧开水瓶，周野喊人别磨蹭，陈骁嘴上嫌累，阿航已经开始热身。',
        '夜宵摊': '夜宵摊热气往上冒，塑料凳有点晃。陈骁拿筷子敲碗，周野在看菜单，赵恺嘴上说少吃点，阿航已经开始点串，林川安静坐在旁边。',
        '便利店': '便利店冷气很足，货架灯白得晃眼。阿航在冰柜前挑饮料，赵恺看配料表，陈骁拿着关东煮，周野催人快点，林川站在门口等。',
        '健身房': '健身房里器械声和音乐混在一起。赵恺在调重量，周野靠在旁边看你动作，陈骁嘴上说练不动，阿航拿着毛巾乱晃，林川在跑步机旁边站着。',
        '雨天校门口': '校门口雨声很密，路灯把水洼照得发亮。林川撑着伞站在边上，周野把外套帽子拉起来，陈骁抱怨鞋湿了，赵恺看手机叫车，阿航问要不要先去便利店躲雨。'
      };
      return map[state.scene] || map['宿舍'];
    }

    function memoryBlock(agentId) {
      const user = state.memory.user || {};
      const profile = state.memory.agentProfiles?.[agentId] || emptyAgentProfile();
      const relation = state.memory.relationMemory?.[agentId] || [];
      return JSON.stringify({ user, agentProfile: profile, relationMemory: relation }, null, 2);
    }

    function plainChatMessages(id, limit = 18) {
      return getIm(id).filter(message => message.role !== 'coach').slice(-limit).map(message => ({
        role: message.role === 'user' ? 'user' : 'assistant',
        content: `${message.sender === '我' ? state.prefs.name : message.sender}：${message.content}`
      }));
    }

    function nsfwInstruction() {
      if (!state.prefs.nsfwGuard) return '成人/粗口总开关关闭。保持普通兄弟群聊天。';
      if (state.mode === 'safe') return '当前模式：safe。允许真实口语和轻微互损，不主动开启成人内容。';
      if (state.mode === 'coarse') return '当前模式：coarse。可以更粗糙、嘴欠、带脏话，但不要变油腻。';
      if (state.mode === 'suggestive') return '当前模式：suggestive。允许成人暗示和黄段子，保持兄弟群语气，用户没继续就收住。';
      return '当前模式：nsfw。用户已主动进入成人话题。所有角色为18岁成年人；维持兄弟关系和用户边界，不强行推进，不写成恋爱乙游。';
    }

    function agentCardText(agent) {
      return `姓名：${agent.name}\n年龄：${agent.age}岁，成年人\n身份：${agent.tag}\n核心性格：${agent.core}\n说话方式：${agent.voice}\n粗口规则：${agent.rough}\n主动消息风格：${agent.proactive}\n边界：${agent.boundary}`;
    }

    function agentPrompt(agent, contextType, threadId) {
      return `${agentCardText(agent)}

当前模式：${contextType === 'scene' ? '场景' : contextType === 'group' ? '群聊IM' : '私聊IM'}。
当前场景：${state.scene}。
用户叫${state.prefs.name}。
当前本地时间：${fullTime(Date.now())}（${timeMood()}）。
聊天节奏：${messageGapSummary(threadId)}。
${nsfwInstruction()}

三层记忆：
${memoryBlock(agent.id)}

回复规则：
- 你现在只扮演${agent.name}一个人。
- 只输出${agent.name}自己的消息正文。
- 不要输出“${agent.name}：”。
- 不要输出时间、日期或元数据。
- 不要输出其他人的话。
- 回复1到3句，像真实 IM。
- 可以粗糙、直接、像兄弟。
- 不写小说旁白，不替用户说话。`;
    }

    function sceneSystemPrompt() {
      return `你是场景模式总控 Scene Agent。当前场景：${state.scene}。
用户和五个18岁成年直男体育生兄弟处在同一个现实场景里：周野篮球队、陈骁足球队、林川田径队、赵恺健身、阿航游泳队。

输出内容：
1. 一段简短场景描写。
2. 2 到 4 条体育生反应。
3. 3 到 5 个快捷行为选项。

格式规则：
- 体育生反应必须是：名字：(动作)台词
- 动作必须用英文半角括号包住，例如：周野：(起身)看看你在干什么？
- 快捷行为也必须是：(动作)台词
- 不要写小说长段。
- 不替用户行动。
- 保持兄弟关系，不乙游，不霸总。

输出格式：
场景：...
周野：(动作)台词
陈骁：(动作)台词
快捷：(动作)选项1｜(动作)选项2｜(动作)选项3`;
    }

    function coachPrompt() {
      return `你是兄弟相处教练，只私下帮助用户学习如何和直男体育生兄弟自然相处。当前时间：${fullTime(Date.now())}。输出：评分、判断、风险、改法3条、下次建议。`;
    }

    function fallbackSpeakers(text) {
      if (/吃|饭|饿|夜宵/.test(text)) return ['zhaokai', 'ahang', 'zhouye'];
      if (/睡|困|累|烦|崩|难受/.test(text)) return ['linchuan', 'zhaokai', 'chenxiao'];
      if (/打球|篮球|出去|走/.test(text)) return ['zhouye', 'chenxiao', 'ahang'];
      if (/哈哈|笑|w|草|操|靠|哈喽/.test(text)) return ['zhouye', 'chenxiao'];
      return [['zhouye', 'chenxiao'], ['linchuan', 'zhaokai'], ['chenxiao', 'ahang'], ['zhouye', 'linchuan']][Math.floor(Math.random() * 4)];
    }

    function localRoute(text) {
      const lower = text.toLowerCase();
      const reset = ['正常点', '别聊黄', '收一收', '别黄', '算了'].some(key => text.includes(key));
      const coach = /^\/coach/i.test(text) || ['教练', '帮我看看', '怎么回', '尴尬', '不太会', '怎么和男生'].some(key => text.includes(key));
      const nsfw = ['聊黄', '黄段子', '色色', '性', 'nsfw', '下流'].some(key => lower.includes(key));
      const suggestive = ['擦边', '暧昧', '成人', '骚话'].some(key => text.includes(key));
      const coarse = ['操', '靠', '傻逼', '滚啊', '你小子'].some(key => text.includes(key));
      let mode = state.mode;
      if (reset) mode = 'safe';
      else if (state.prefs.autoNSFW && state.prefs.nsfwGuard && nsfw) mode = 'nsfw';
      else if (state.prefs.autoNSFW && state.prefs.nsfwGuard && suggestive) mode = 'suggestive';
      else if (coarse) mode = mode === 'safe' ? 'coarse' : mode;
      return { mode, needCoach: coach, needDeep: coach || nsfw || suggestive, speakers: fallbackSpeakers(text), reason: 'local' };
    }

    function routerPrompt(text, threadId) {
      return `你是轻量路由模型，只输出 JSON。
当前线程：${threadId}
当前场景：${state.scene}
当前模式：${state.mode}
用户输入：${text}
可用发言人：zhouye, chenxiao, linchuan, zhaokai, ahang
JSON格式：{"mode":"safe|coarse|suggestive|nsfw","needCoach":false,"needDeep":false,"speakers":["zhouye","chenxiao"],"reason":"短原因"}
规则：群聊 speakers 选择1到3个人；只有最适合当前气氛的人说话；用户要求社交建议时 needCoach=true。`;
    }

    function normalizeRoute(data, fallback) {
      const route = { ...fallback, ...(data || {}) };
      if (!['safe', 'coarse', 'suggestive', 'nsfw'].includes(route.mode)) route.mode = fallback.mode;
      if (!Array.isArray(route.speakers)) route.speakers = fallback.speakers;
      route.speakers = route.speakers.filter(id => agentIds.includes(id)).filter((id, index, arr) => arr.indexOf(id) === index).slice(0, 3);
      if (!route.speakers.length) route.speakers = fallback.speakers;
      route.needCoach = !!route.needCoach;
      route.needDeep = !!route.needDeep;
      return route;
    }

    async function routeMessage(text, threadId) {
      const fallback = localRoute(text);
      if (!config.routerModel) return fallback;
      try {
        const raw = await callLLM([{ role: 'system', content: routerPrompt(text, threadId) }, { role: 'user', content: text }], { model: config.routerModel, temperature: 0.05 });
        return normalizeRoute(JSON.parse(raw.replace(/^```json/i, '').replace(/```$/i, '').trim()), fallback);
      } catch {
        return fallback;
      }
    }

    function cleanAgentReply(raw, agent) {
      return String(raw || '')
        .replace(/^\s*\[?\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}\]?\s*[｜|:]?\s*/gm, '')
        .replace(/^\s*时间\s*\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}\s*[｜|:]?\s*/gm, '')
        .replace(/^\s*时间\s*/gm, '')
        .replace(new RegExp(`^\\s*${agent.name}[：:]\\s*`), '')
        .replace(/^\s*(周野|陈骁|林川|赵恺|阿航)[：:]\s*/gm, '')
        .trim();
    }

    function render() {
      const hasConfig = !!config;
      $('#setup').classList.toggle('hide', hasConfig);
      $('#app').classList.toggle('hide', !hasConfig);
      if (!hasConfig) return;

      $('#sceneTitle').textContent = state.scene;
      $('#sceneSelect').value = state.scene;
      $('#intro').textContent = introText();

      $('#members').innerHTML = agents.map(agent => `
        <div class="member">
          <div class="avatar">${escapeHtml(agent.av)}</div>
          <div>
            <b>${escapeHtml(agent.name)}</b>
            <div class="sub">${escapeHtml(agent.tag)}</div>
          </div>
        </div>
      `).join('');

      $('#sceneLog').innerHTML = state.sceneLog.map(item => {
        if (item.role === 'me') return `<div class="scene-line me"><div class="scene-bubble">${renderSceneText(item.text)}</div></div>`;
        if (item.role === 'scene') return `<div class="narration">${escapeHtml(item.text)}</div>`;
        return `<div class="scene-line"><div class="avatar">${escapeHtml(item.name.slice(0, 1))}</div><div class="scene-bubble"><b>${escapeHtml(item.name)}</b><br>${renderSceneText(item.text)}</div></div>`;
      }).join('');

      $('#quickActions').innerHTML = state.quick.map(action => `<button class="btn action-btn" data-action="${escapeHtml(action)}">${escapeHtml(action)}</button>`).join('');
      document.querySelectorAll('[data-action]').forEach(button => { button.onclick = () => sendSceneAction(button.dataset.action); });

      renderIm();
    }

    function renderIm() {
      const current = getImThread();
      $('#imTitle').textContent = displayName(current);
      $('#imSub').textContent = current.type === 'group' ? '真多 agent 群聊' : current.tag;
      $('#modePill').textContent = state.mode;
      $('#modePill').classList.toggle('hot', state.mode !== 'safe');
      $('#deepPill').textContent = state.prefs.deepMode === 'auto' ? '自动深思' : state.prefs.deepMode;
      $('#proactivePill').textContent = state.prefs.proactive ? '主动开' : '主动关';
      $('#editToggle').textContent = state.prefs.edit ? '编辑开' : '编辑关';
      $('#editToggle').classList.toggle('primary', state.prefs.edit);

      $('#imTabs').innerHTML = imThreads.map(thread => `<button class="btn ${thread.id === activeIm ? 'active' : ''}" data-im="${thread.id}">${escapeHtml(displayName(thread))}</button>`).join('');
      document.querySelectorAll('[data-im]').forEach(button => { button.onclick = () => { activeIm = button.dataset.im; renderIm(); }; });

      const rows = [];
      let prevTs = 0;
      getIm().forEach(message => {
        if (!prevTs || message.ts - prevTs > TIME_GAP_MS) rows.push(`<div class="time-divider">${dividerTime(message.ts)}</div>`);
        prevTs = message.ts;
        if (message.role === 'coach') {
          rows.push(`<div class="coach-card"><b>教练</b><pre>${escapeHtml(message.content)}</pre></div>`);
          return;
        }
        const isUser = message.role === 'user';
        const agent = getAgentByName(message.sender);
        const avatar = isUser ? avatarHtml() : escapeHtml(agent ? agent.av : message.sender.slice(0, 1));
        rows.push(`
          <div class="im-row ${isUser ? 'me' : ''}">
            ${isUser ? '' : `<div class="avatar">${avatar}</div>`}
            <div class="im-col">
              ${isUser ? '' : `<div class="im-sender">${escapeHtml(senderName(message.sender))}</div>`}
              <div class="im-bubble" data-mid="${message.id}">${escapeHtml(message.content)}</div>
              <div class="meta-line">${fullTime(message.ts).slice(11)}${message.edited ? ' · 已修改' : ''}${message.proactive ? ' · 主动消息' : ''}</div>
            </div>
            ${isUser ? `<div class="avatar">${avatarHtml()}</div>` : ''}
          </div>
        `);
      });
      $('#imLog').innerHTML = rows.join('');
      bindBubbleEvents();
      $('#imLog').scrollTop = $('#imLog').scrollHeight;
    }

    function bindBubbleEvents() {
      document.querySelectorAll('[data-mid]').forEach(element => {
        const messageId = element.dataset.mid;
        element.onclick = () => {
          if (suppressNextClick) { suppressNextClick = false; return; }
          if (state.prefs.edit) openEdit(messageId, 'edit');
        };
        element.onpointerdown = () => {
          clearTimeout(longPressTimer);
          element.classList.add('pressed');
          longPressTimer = setTimeout(() => {
            element.classList.remove('pressed');
            const message = getIm().find(item => item.id === messageId);
            if (message && message.role === 'user') { suppressNextClick = true; openEdit(messageId, 'edit'); }
          }, LONG_PRESS_MS);
        };
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(eventName => element.addEventListener(eventName, () => { clearTimeout(longPressTimer); element.classList.remove('pressed'); }));
      });
    }

    function parseSceneReply(raw) {
      const lines = raw.split(/\n+/).map(line => line.trim()).filter(Boolean);
      const nextQuick = [];
      const names = new Set(agents.map(agent => agent.name));
      lines.forEach(line => {
        if (line.startsWith('场景')) { state.sceneLog.push({ role: 'scene', text: line.replace(/^场景[:：]/, '').trim() }); return; }
        if (line.startsWith('快捷')) {
          line.replace(/^快捷[:：]/, '').split(/[｜|]/).map(item => ensureActionFormat(item.trim())).filter(Boolean).forEach(item => nextQuick.push(item));
          return;
        }
        const match = line.match(/^([^：:]{1,8})[：:](.+)$/);
        if (match && names.has(match[1].trim())) state.sceneLog.push({ role: 'agent', name: match[1].trim(), text: ensureActionFormat(match[2].trim()) });
      });
      if (nextQuick.length) state.quick = nextQuick.slice(0, 5);
    }

    function showError(message) {
      $('#error').textContent = message || '';
      $('#error').classList.toggle('hide', !message);
    }

    async function sendSceneAction(text) {
      if (!text || !config) return;
      showError('');
      state.sceneLog.push({ role: 'me', text: ensureActionFormat(text) });
      saveState();
      render();
      try {
        const recent = state.sceneLog.slice(-12).map(item => ({ role: item.role === 'me' ? 'user' : 'assistant', content: item.role === 'me' ? item.text : (item.name ? `${item.name}：${item.text}` : item.text) }));
        const raw = await callLLM([{ role: 'system', content: sceneSystemPrompt() }, ...recent, { role: 'user', content: text }], { temperature: 0.92 });
        parseSceneReply(raw);
        saveState();
        render();
      } catch (error) { showError(error.message || '请求失败'); }
    }

    async function generateSingleAgent(agentId, threadId, route = {}) {
      const agent = getAgent(agentId);
      const model = route.needDeep && config.deepModel ? config.deepModel : config.model;
      const contextType = threadId === 'group' ? 'group' : 'private';
      const raw = await callLLM([{ role: 'system', content: agentPrompt(agent, contextType, threadId) }, ...plainChatMessages(threadId, 18)], { model, temperature: contextType === 'group' ? 0.88 : 0.84 });
      return cleanAgentReply(raw, agent);
    }

    async function generateImReply(route) {
      loadingIm = true;
      renderIm();
      try {
        const thread = getImThread();
        if (thread.type === 'group') {
          for (const speakerId of route.speakers) {
            const agent = getAgent(speakerId);
            const reply = await generateSingleAgent(speakerId, 'group', route);
            if (reply) getIm('group').push(makeMessage('assistant', agent.name, reply));
            saveState(); renderIm();
          }
        } else if (thread.type === 'agent') {
          const reply = await generateSingleAgent(thread.id, thread.id, route);
          if (reply) getIm(thread.id).push(makeMessage('assistant', thread.name, reply));
        }
        saveState();
      } catch (error) { showError(error.message || 'IM 请求失败'); }
      finally { loadingIm = false; renderIm(); }
    }

    async function sendImMessage(text) {
      if (!text || !config || loadingIm) return;
      showError('');
      const threadId = activeIm;
      const route = await routeMessage(text, threadId);
      if (['safe', 'coarse', 'suggestive', 'nsfw'].includes(route.mode)) state.mode = route.mode;
      getIm(threadId).push(makeMessage('user', '我', text));
      saveState();
      renderIm();
      try {
        if (threadId !== 'coach' && route.needCoach) {
          activeIm = 'coach';
          getIm('coach').push(makeMessage('user', '我', text));
          const model = route.needDeep && config.deepModel ? config.deepModel : config.model;
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, { role: 'user', content: text }], { model, temperature: 0.45 });
          getIm('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState(); renderIm(); return;
        }
        if (threadId === 'coach') {
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, ...plainChatMessages('coach')], { temperature: 0.45 });
          getIm('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState(); renderIm(); return;
        }
        await generateImReply(route);
      } catch (error) { showError(error.message || 'IM 请求失败'); }
    }

    function proactiveCandidate() {
      const hour = new Date().getHours();
      if (hour >= 0 && hour < 5) return { id: 'linchuan', text: '还没睡？' };
      if (hour >= 11 && hour < 14) return { id: 'zhaokai', text: '吃饭没，别又糊弄。' };
      if (hour >= 18 && hour < 22) return { id: 'zhouye', text: '晚上出来不？别窝着。' };
      const pool = [{ id: 'chenxiao', text: '人呢，你小子又消失了？' }, { id: 'ahang', text: '我靠我有点想吃夜宵了，你来不来。' }, { id: 'zhouye', text: '走啊，动一动。' }];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    async function maybeProactive(force = false) {
      if (!state.prefs.proactive || loadingIm || !config) return;
      const now = Date.now();
      const allMessages = Object.values(state.im).flat();
      const lastAny = Math.max(...allMessages.map(message => message.ts || 0));
      const enoughIdle = now - lastAny > 2 * 60 * 60 * 1000;
      const enoughSinceProactive = now - (state.lastProactiveAt || 0) > 60 * 60 * 1000;
      if (!force && (!enoughIdle || !enoughSinceProactive)) return;
      const candidate = proactiveCandidate();
      const agent = getAgent(candidate.id);
      getIm(candidate.id).push(makeMessage('assistant', agent.name, candidate.text, { proactive: true }));
      getIm('group').push(makeMessage('assistant', agent.name, candidate.text, { proactive: true }));
      state.lastProactiveAt = now;
      saveState(); renderIm();
      if (state.prefs.notifications && 'Notification' in window && Notification.permission === 'granted') new Notification(senderName(agent.name), { body: candidate.text });
    }

    function openModal(title, html, mode) { modalMode = mode; $('#modalTitle').textContent = title; $('#modalBody').innerHTML = html; $('#deleteMsg').classList.toggle('hide', mode !== 'edit'); $('#mask').classList.remove('hide'); }
    function closeModal() { $('#mask').classList.add('hide'); editing = null; }
    function openEdit(messageId, mode) { const messages = getIm(); const index = messages.findIndex(message => message.id === messageId); if (index < 0 || messages[index].role === 'coach') return; editing = { id: messageId, mode }; openModal(mode === 'regen' ? '修改最后一句并重生' : '修改消息', `<textarea id="editText">${escapeHtml(messages[index].content)}</textarea><small>保存后会修改上下文。</small>`, mode); }

    function saveModal() {
      if (modalMode === 'profile') { state.prefs.name = $('#pname').value.trim() || '我'; state.prefs.avatar = $('#pav').value.trim() || '我'; state.prefs.avatarUrl = $('#purl').value.trim(); saveState(); closeModal(); render(); return; }
      if (modalMode === 'remark') { state.prefs.remarks[activeIm] = $('#rname').value.trim(); saveState(); closeModal(); renderIm(); return; }
      if (modalMode === 'settings') { state.prefs.nsfwGuard = $('#nsfwGuard').checked; state.prefs.autoNSFW = $('#autoNSFW').checked; state.prefs.proactive = $('#proactiveSetting').checked; state.prefs.notifications = $('#notifySetting').checked; state.prefs.deepMode = $('#deepMode').value; if (state.prefs.notifications && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission(); saveState(); closeModal(); renderIm(); return; }
      const messages = getIm(); const index = messages.findIndex(message => message.id === editing.id); const value = $('#editText').value.trim();
      if (index >= 0 && value) { messages[index].content = value; messages[index].edited = true; if (editing.mode === 'regen') { messages.splice(index + 1); saveState(); closeModal(); routeMessage(value, activeIm).then(route => generateImReply(route)); return; } saveState(); }
      closeModal(); renderIm();
    }

    function deleteMessage() { const messages = getIm(); const index = messages.findIndex(message => message.id === (editing && editing.id)); if (index >= 0) messages.splice(index, 1); saveState(); closeModal(); renderIm(); }
    function openProfile() { openModal('个人资料', `<label>名称<input id="pname" value="${escapeHtml(state.prefs.name)}"></label><label>文字头像<input id="pav" value="${escapeHtml(state.prefs.avatar)}"></label><label>头像URL/Base64<input id="purl" value="${escapeHtml(state.prefs.avatarUrl)}"></label>`, 'profile'); }
    function openRemark() { const thread = getImThread(); if (thread.type !== 'agent') return; openModal('备注名', `<label>备注名<input id="rname" value="${escapeHtml(state.prefs.remarks[activeIm] || '')}"></label><small>仅本机显示。</small>`, 'remark'); }
    function openSettings() { openModal('场景 IM 设置', `<label><input id="nsfwGuard" type="checkbox" ${state.prefs.nsfwGuard ? 'checked' : ''}> 成人/粗口总开关</label><label><input id="autoNSFW" type="checkbox" ${state.prefs.autoNSFW ? 'checked' : ''}> 自动判断 coarse / suggestive / nsfw</label><label><input id="proactiveSetting" type="checkbox" ${state.prefs.proactive ? 'checked' : ''}> 网页打开时允许 Agent 主动消息</label><label><input id="notifySetting" type="checkbox" ${state.prefs.notifications ? 'checked' : ''}> 浏览器通知权限</label><label>深思模式<select id="deepMode"><option value="auto" ${state.prefs.deepMode === 'auto' ? 'selected' : ''}>自动</option><option value="fast" ${state.prefs.deepMode === 'fast' ? 'selected' : ''}>快速</option><option value="deep" ${state.prefs.deepMode === 'deep' ? 'selected' : ''}>强制深思</option></select></label>`, 'settings'); }
    function backup() { const blob = new Blob([JSON.stringify({ version: 'scenes-v04', state }, null, 2)], { type: 'application/json' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'sports-bros-scenes-v04-backup.json'; link.click(); URL.revokeObjectURL(link.href); }
    function importBackup(file) { const reader = new FileReader(); reader.onload = () => { try { const data = JSON.parse(reader.result); if (data.state) { const base = defaultState(); state = { ...base, ...data.state, prefs: { ...base.prefs, ...(data.state.prefs || {}) }, im: { ...base.im, ...(data.state.im || {}) }, memory: { ...base.memory, ...(data.state.memory || {}) } }; saveState(); render(); } else showError('格式不对'); } catch (error) { showError(error.message); } }; reader.readAsText(file); }

    function init() {
      try { config = JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null'); const saved = JSON.parse(localStorage.getItem(STATE_KEY) || 'null'); if (saved) { const base = defaultState(); state = { ...base, ...saved, prefs: { ...base.prefs, ...(saved.prefs || {}) }, im: { ...base.im, ...(saved.im || {}) }, memory: { ...base.memory, ...(saved.memory || {}) } }; } } catch {}
      $('#setupForm').onsubmit = event => { event.preventDefault(); config = { endpoint: $('#endpoint').value.trim(), key: $('#apiKey').value.trim(), model: $('#model').value.trim(), routerModel: $('#routerModel').value.trim(), deepModel: $('#deepModel').value.trim() }; localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); render(); maybeProactive(true); };
      $('#sceneForm').onsubmit = event => { event.preventDefault(); const value = $('#sceneInput').value.trim(); $('#sceneInput').value = ''; sendSceneAction(value); };
      $('#imForm').onsubmit = event => { event.preventDefault(); const value = $('#imInput').value.trim(); $('#imInput').value = ''; sendImMessage(value); };
      $('#changeScene').onclick = () => { state.scene = $('#sceneSelect').value; state.sceneLog.push({ role: 'scene', text: `场景切换到：${state.scene}` }); saveState(); render(); };
      $('#resetScene').onclick = () => { state.sceneLog = []; saveState(); render(); };
      $('#resetConfig').onclick = () => { localStorage.removeItem(CONFIG_KEY); config = null; render(); };
      $('#mobileImBtn').onclick = () => $('#imPanel').classList.toggle('mobile-hidden');
      $('#closeMobileIm').onclick = () => $('#imPanel').classList.add('mobile-hidden');
      $('#profileBtn').onclick = openProfile;
      $('#backupBtn').onclick = backup;
      $('#importBtn').onclick = () => $('#file').click();
      $('#file').onchange = event => { if (event.target.files[0]) importBackup(event.target.files[0]); };
      $('#settingsBtn').onclick = openSettings;
      $('#editToggle').onclick = () => { state.prefs.edit = !state.prefs.edit; saveState(); renderIm(); };
      $('#cancel').onclick = closeModal;
      $('#save').onclick = saveModal;
      $('#deleteMsg').onclick = deleteMessage;
      $('#mask').onclick = event => { if (event.target.id === 'mask') closeModal(); };
      render(); maybeProactive(false); setInterval(() => maybeProactive(false), PROACTIVE_CHECK_MS);
    }

    init();
  </script>
</body>
</html>
