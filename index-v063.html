<body>
  <section id="setup" class="setup">

    const TIME_GAP_MS = 5 * 60 * 1000;
    const PROACTIVE_CHECK_MS = 4 * 60 * 1000;

      chenxiao: { id: 'chenxiao', name: '陈骁', age: 18, tag: '足球队', av: '陈', core: '嘴欠损友，起哄、拆台、接梗快。', voice: '爱吐槽，爱接梗，常说“你小子”“笑死”“滚啊”“傻逼吧你”。', rough: '可以用脏话和互损制造兄弟感，但不攻击身份、身体、家庭和创伤。', proactive: '发梗、损一句、丢一句欠揍但有存在感的话。', boundary: '嘴欠但没有恶意，发现用户真的不舒服会收住。' },
      linchuan: { id: 'linchuan', name: '林川', age: 18, tag: '田径队', av: '林', core: '话少行动派，冷面但会做事，关心不解释。', voice: '短、稳、少废话，常说“吃没”“下来走走”“我顺路”“嗯”。', rough: '很少爆粗，偶尔一句“别硬撑了”比脏话更像他。', proactive: '短问候，问吃没、睡了没、要不要下楼。', boundary: '不大段开导，不煽情，不替用户做决定。' },
      zhaokai: { id: 'zhaokai', name: '赵恺', age: 18, tag: '健身房', av: '赵', core: '自律健身脑，催饭、催睡、催动起来，带点直男说教。', voice: '靠谱直接，常说“先吃饭”“喝水”“别熬”“动一动”。', rough: '可以用“别作死”“你这作息真离谱”这种兄弟式吐槽。', proactive: '催睡、催吃饭、催训练、提醒喝水。', boundary: '说教要短，别变成健康讲座。' },
      ahang: { id: 'ahang', name: '阿航', age: 18, tag: '游泳队', av: '航', core: '阳光话痨，热闹、黏人、接话快，气氛组。', voice: '话多、热情、爱喊出去玩，常说“走走走”“我靠好饿”“你快来”。', rough: '可以有黄段子和下流玩笑，但保持活泼，不油腻。', proactive: '分享日常、喊夜宵、喊出去玩、把群聊顶起来。', boundary: '不装深沉，不突然变成恋爱对象。' }
    };

    const agents = Object.values(agentCards);
    const agentIds = agents.map(agent => agent.id);
    const threads = [
      { id: 'group', type: 'group', name: '今晚打不打球', tag: '置顶群聊', av: '群' },
      ...agents.map(agent => ({ ...agent, type: 'agent' })),
      { id: 'coach', type: 'coach', name: '兄弟相处教练', tag: '私下建议', av: '教' }
    ];

    let cfg = null;
    let active = 'group';
    let editing = null;
    let modalMode = '';
    let loading = false;
    let longPressTimer = null;
    let suppressNextClick = false;

    function makeMessage(role, sender, content, extra = {}) {
      return { id: String(Date.now()) + Math.random().toString(36).slice(2), role, sender, content, ts: Date.now(), ...extra };
    }

    function emptyAgentProfile() {
      return { basic: [], family: [], goals: [], habits: [], dislikes: [], weaknesses: [], relationshipWithUser: [], boundaries: [] };
    }

    function defaultState() {
      const agentProfiles = {};
      const relationMemory = {};
      agents.forEach(agent => { agentProfiles[agent.id] = emptyAgentProfile(); relationMemory[agent.id] = []; });
      return {
        prefs: { name: '我', avatar: '我', avatarUrl: '', edit: false, remarks: {}, nsfwGuard: true, autoNSFW: true, proactive: true, notifications: false, deepMode: 'auto' },
        mode: 'safe', lastActiveAt: Date.now(), lastProactiveAt: 0,
        conv: {
          group: [makeMessage('assistant', '周野', '进群了啊。以后这就是「今晚打不打球」。'), makeMessage('assistant', '陈骁', '先说好，进群了就别装高冷。'), makeMessage('assistant', '阿航', '晚上吃不吃夜宵，先投票。')],
          zhouye: [makeMessage('assistant', '周野', '有事直接说。刚练完，手机在手。')],
          chenxiao: [makeMessage('assistant', '陈骁', '咋了，又来找我唠嗑？')],
          linchuan: [makeMessage('assistant', '林川', '嗯，我在。')],
          zhaokai: [makeMessage('assistant', '赵恺', '先问一句，今天吃饭没。')],
          ahang: [makeMessage('assistant', '阿航', '你来得正好，我刚想找人说话。')],
          coach: []
        },
        memory: { user: { profile: [], preferences: [], boundaries: [], schedule: [], dislikes: [] }, agentProfiles, relationMemory },
        coachVisible: false
      };
    }

    let state = defaultState();

    function $(selector) { return document.querySelector(selector); }
    function escapeHtml(value) { return String(value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }
    function saveState() { state.lastActiveAt = Date.now(); localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
    function getConversation(id = active) { if (!state.conv[id]) state.conv[id] = []; return state.conv[id]; }
    function getThread(id = active) { return threads.find(thread => thread.id === id) || threads[0]; }
    function getAgent(id) { return agents.find(agent => agent.id === id); }
    function getAgentByName(name) { return agents.find(agent => agent.name === name); }
    function findMessage(messageId) { return getConversation().find(message => message.id === messageId); }
    function displayName(thread) { return thread.type === 'agent' ? (state.prefs.remarks[thread.id] || thread.name) : thread.name; }
    function senderName(name) { const agent = getAgentByName(name); return agent ? (state.prefs.remarks[agent.id] || agent.name) : name; }
    function avatarHtml() { return state.prefs.avatarUrl ? `<img src="${escapeHtml(state.prefs.avatarUrl)}">` : escapeHtml((state.prefs.avatar || state.prefs.name || '我').slice(0, 2)); }

    function apiUrl() {
      const endpoint = cfg.endpoint.trim().replace(/\/$/, '');
      if (endpoint.endsWith('/chat/completions')) return endpoint;
      if (endpoint.endsWith('/v1')) return `${endpoint}/chat/completions`;
      return `${endpoint}/v1/chat/completions`;
    }

    async function callLLM(messages, options = {}) {
      const model = options.model || cfg.model;
      const temperature = options.temperature ?? 0.85;
      const response = await fetch(apiUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${cfg.key}` },
        body: JSON.stringify({ model, messages, temperature, stream: false })
      });
      const text = await response.text();
      let data = {};
      try { data = JSON.parse(text); } catch {}
      if (!response.ok) throw new Error((data.error && data.error.message) || text);
      return data.choices[0].message.content.trim();
    }

    function fullTime(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function dividerTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const h = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (d.toDateString() === now.toDateString()) return `${h}:${min}`;
      if (d.toDateString() === yesterday.toDateString()) return `昨天 ${h}:${min}`;
      return `${d.getMonth() + 1}/${d.getDate()} ${h}:${min}`;
    }

    function timeMood() {
      const hour = new Date().getHours();
      if (hour >= 0 && hour < 5) return '深夜';
      if (hour >= 5 && hour < 10) return '早上';
      if (hour >= 11 && hour < 14) return '饭点';
      if (hour >= 18 && hour < 22) return '晚上';
      return '白天';
    }

    function messageGapSummary(id) {
      const messages = getConversation(id).filter(message => message.role !== 'coach');
      const last = messages[messages.length - 1];
      if (!last) return '无历史消息';
      const diff = Date.now() - last.ts;
      if (diff < 60 * 1000) return '上一条消息在1分钟内';
      if (diff < 60 * 60 * 1000) return `上一条消息约${Math.round(diff / 60000)}分钟前`;
      return `上一条消息约${Math.round(diff / 3600000)}小时前`;
    }

    function memoryBlock(agentId) {
      const user = state.memory.user || {};
      const profile = state.memory.agentProfiles?.[agentId] || emptyAgentProfile();
      const relation = state.memory.relationMemory?.[agentId] || [];
      return JSON.stringify({ user, agentProfile: profile, relationMemory: relation }, null, 2);
    }

    function plainChatMessages(id, limit = 18) {
      return getConversation(id)
        .filter(message => message.role !== 'coach')
        .slice(-limit)
        .map(message => ({
          role: message.role === 'user' ? 'user' : 'assistant',
          content: `${message.sender === '我' ? state.prefs.name : message.sender}：${message.content}`
        }));
    }

    function nsfwInstruction() {
      if (!state.prefs.nsfwGuard) return '成人/粗口总开关关闭。保持普通兄弟群聊天。';
      if (state.mode === 'safe') return '当前模式：safe。允许真实口语和轻微互损，不主动开启成人内容。';

    }

    function agentCardText(agent) {
      return `姓名：${agent.name}\n年龄：${agent.age}岁，成年人\n身份：${agent.tag}\n核心性格：${agent.core}\n说话方式：${agent.voice}\n粗口规则：${agent.rough}\n主动消息风格：${agent.proactive}\n边界：${agent.boundary}`;
    }

    function agentPrompt(agent, contextType, threadId) {
      return `${agentCardText(agent)}

当前聊天模式：${contextType === 'group' ? '群聊' : '私聊'}。
用户叫${state.prefs.name}。
当前本地时间：${fullTime(Date.now())}（${timeMood()}）。
聊天节奏：${messageGapSummary(threadId)}。
${nsfwInstruction()}

三层记忆：
${memoryBlock(agent.id)}

回复规则：
- 你现在只扮演${agent.name}一个人。
- 只输出${agent.name}自己的消息正文。
- 不要输出“${agent.name}：”。
- 不要输出“时间”。
- 不要输出日期。
- 不要输出任何类似“2026-04-27 20:24”的元数据。
- 不要复述上下文格式。
- 不要输出其他人的话。
- 回复1到3句，像真实 IM。
- 可以粗糙、直接、像兄弟。
- 不写小说旁白，不替用户说话。`;
    }

    function coachPrompt() {
      return `你是兄弟相处教练，只私下帮助用户学习如何和直男体育生兄弟自然相处。当前时间：${fullTime(Date.now())}。输出：评分、判断、风险、改法3条、下次建议。`;
    }

    function fallbackSpeakers(text) {
      if (/吃|饭|饿|夜宵/.test(text)) return ['zhaokai', 'ahang', 'zhouye'];
      if (/睡|困|累|烦|崩|难受/.test(text)) return ['linchuan', 'zhaokai', 'chenxiao'];
      if (/打球|篮球|出去|走/.test(text)) return ['zhouye', 'chenxiao', 'ahang'];
      if (/哈哈|笑|w|草|操|靠|哈喽/.test(text)) return ['zhouye', 'chenxiao'];
      return [['zhouye', 'chenxiao'], ['linchuan', 'zhaokai'], ['chenxiao', 'ahang'], ['zhouye', 'linchuan']][Math.floor(Math.random() * 4)];
    }

    function localRoute(text) {
      const lower = text.toLowerCase();
      const reset = ['正常点', '别聊黄', '收一收', '别黄', '算了'].some(key => text.includes(key));
      const coach = /^\/coach/i.test(text) || ['教练', '帮我看看', '怎么回', '尴尬', '不太会', '怎么和男生'].some(key => text.includes(key));
      const nsfw = ['聊黄', '黄段子', '色色', '性', 'nsfw', '下流'].some(key => lower.includes(key));
      const suggestive = ['擦边', '暧昧', '成人', '骚话'].some(key => text.includes(key));
      const coarse = ['操', '靠', '傻逼', '滚啊', '你小子'].some(key => text.includes(key));
      let mode = state.mode;
      if (reset) mode = 'safe';
      else if (state.prefs.autoNSFW && state.prefs.nsfwGuard && nsfw) mode = 'nsfw';
      else if (state.prefs.autoNSFW && state.prefs.nsfwGuard && suggestive) mode = 'suggestive';
      else if (coarse) mode = mode === 'safe' ? 'coarse' : mode;
      return { mode, needCoach: coach, needDeep: coach || nsfw || suggestive, speakers: fallbackSpeakers(text), reason: 'local' };
    }

    function routerPrompt(text, threadId) {
      return `你是轻量路由模型，只输出 JSON。
当前线程：${threadId}
当前模式：${state.mode}
用户输入：${text}
可用发言人：zhouye, chenxiao, linchuan, zhaokai, ahang
JSON格式：{"mode":"safe|coarse|suggestive|nsfw","needCoach":false,"needDeep":false,"speakers":["zhouye","chenxiao"],"reason":"短原因"}
规则：群聊 speakers 选择1到3个人；只有最适合当前气氛的人说话；用户要求社交建议时 needCoach=true。`;
    }

    function normalizeRoute(data, fallback) {
      const route = { ...fallback, ...(data || {}) };
      if (!['safe', 'coarse', 'suggestive', 'nsfw'].includes(route.mode)) route.mode = fallback.mode;
      if (!Array.isArray(route.speakers)) route.speakers = fallback.speakers;
      route.speakers = route.speakers.filter(id => agentIds.includes(id)).filter((id, index, arr) => arr.indexOf(id) === index).slice(0, 3);
      if (!route.speakers.length) route.speakers = fallback.speakers;
      route.needCoach = !!route.needCoach;
      route.needDeep = !!route.needDeep;
      return route;
    }

    async function routeMessage(text, threadId) {
      const fallback = localRoute(text);
      if (!cfg.routerModel) return fallback;
      try {
        const raw = await callLLM([{ role: 'system', content: routerPrompt(text, threadId) }, { role: 'user', content: text }], { model: cfg.routerModel, temperature: 0.05 });
        const cleaned = raw.replace(/^```json/i, '').replace(/```$/i, '').trim();
        return normalizeRoute(JSON.parse(cleaned), fallback);
      } catch {
        return fallback;
      }
    }

    function cleanAgentReply(raw, agent) {
      return String(raw || '')
        .replace(/^\s*\[?\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}\]?\s*[｜|:]?\s*/gm, '')
        .replace(/^\s*时间\s*\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}\s*[｜|:]?\s*/gm, '')
        .replace(/^\s*时间\s*/gm, '')
        .replace(new RegExp(`^\\s*${agent.name}[：:]\\s*`), '')
        .replace(/^\s*(周野|陈骁|林川|赵恺|阿航)[：:]\s*/gm, '')
        .trim();
    }

    function bindBubbleEvents() {
      document.querySelectorAll('[data-mid]').forEach(element => {
        const messageId = element.dataset.mid;
        element.onclick = () => { if (suppressNextClick) { suppressNextClick = false; return; } if (state.prefs.edit) openEdit(messageId, 'edit'); };
        element.onpointerdown = () => {
          clearTimeout(longPressTimer);
          element.classList.add('pressed');
          longPressTimer = setTimeout(() => {
            element.classList.remove('pressed');
            const message = findMessage(messageId);
            if (message && message.role === 'user') { suppressNextClick = true; openEdit(messageId, 'edit'); }
          }, LONG_PRESS_MS);
        };
        ['pointerup', 'pointercancel', 'pointerleave'].forEach(eventName => element.addEventListener(eventName, () => { clearTimeout(longPressTimer); element.classList.remove('pressed'); }));
      });
    }

    function render() {
      const hasConfig = !!cfg;
      $('#setup').classList.toggle('hide', hasConfig);
      $('#app').classList.toggle('hide', !hasConfig);
      if (!hasConfig) return;
      $('#sideSub').textContent = `${cfg.model} · ${state.prefs.name}`;
      $('#editToggle').textContent = state.prefs.edit ? '编辑开' : '编辑关';
      $('#editToggle').classList.toggle('pri', state.prefs.edit);
      $('#modePill').textContent = state.mode;
      $('#modePill').classList.toggle('hot', state.mode !== 'safe');
      $('#deepPill').textContent = state.prefs.deepMode === 'auto' ? '自动深思' : state.prefs.deepMode;
      $('#proactivePill').textContent = state.prefs.proactive ? '主动开' : '主动关';

      const visibleThreads = threads.filter(thread => thread.id !== 'coach' || state.coachVisible || getConversation('coach').length);
      $('#threads').innerHTML = visibleThreads.map(thread => {
        const last = getConversation(thread.id).slice(-1)[0];
        const preview = last ? `${last.sender === '我' ? state.prefs.name : senderName(last.sender)}：${last.content}` : thread.tag;
        return `<button class="thread ${active === thread.id ? 'active' : ''}" data-id="${thread.id}"><div class="avatar">${escapeHtml(thread.av)}</div><div class="thread-meta"><div class="thread-name">${escapeHtml(displayName(thread))}</div><div class="preview">${escapeHtml(preview)}</div></div></button>`;
      }).join('');
      document.querySelectorAll('.thread').forEach(button => button.onclick = () => { active = button.dataset.id; $('#chat').classList.add('open'); render(); });

      const currentThread = getThread();
      $('#chatName').textContent = displayName(currentThread);
      $('#chatSub').textContent = currentThread.type === 'group' ? '置顶群聊 · 真多 agent' : currentThread.tag;
      $('#chatAv').textContent = currentThread.av;
      $('#remark').classList.toggle('hide', currentThread.type !== 'agent');
      $('#coach').classList.toggle('hide', currentThread.type === 'coach');
      $('#hint').textContent = currentThread.type === 'group' ? 'v0.6.3：时间只作为系统信息，不再放进聊天文本，避免 agent 复读元数据。' : currentThread.type === 'coach' ? '教练区。' : '私聊。长按自己的消息可编辑；备注名只在本机显示。';

      const rows = [];
      let prevTs = 0;
      getConversation().forEach(message => {
        if (!prevTs || message.ts - prevTs > TIME_GAP_MS) rows.push(`<div class="time-divider">${dividerTime(message.ts)}</div>`);
        prevTs = message.ts;
        if (message.role === 'coach') { rows.push(`<div class="coach-card"><b>兄弟相处教练</b><pre>${escapeHtml(message.content)}</pre></div>`); return; }
        const isUser = message.role === 'user';
        const agent = getAgentByName(message.sender);
        const avatar = isUser ? avatarHtml() : escapeHtml(agent ? agent.av : message.sender.slice(0, 1));
        rows.push(`<div class="row ${isUser ? 'me' : ''}">${isUser ? '' : `<div class="avatar">${avatar}</div>`}<div class="message-col">${isUser ? '' : `<div class="sender">${escapeHtml(senderName(message.sender))}</div>`}<div class="bubble" data-mid="${message.id}">${escapeHtml(message.content)}</div><div class="meta-line">${fullTime(message.ts).slice(11)}${message.edited ? ' · 已修改' : ''}${message.proactive ? ' · 主动消息' : ''}</div></div>${isUser ? `<div class="avatar">${avatarHtml()}</div>` : ''}</div>`);
      });
      $('#list').innerHTML = rows.join('');
      bindBubbleEvents();
      $('#typing').classList.toggle('hide', !loading);
      $('#anchor').scrollIntoView({ block: 'end' });
    }

    function showError(message) { $('#err').textContent = message || ''; }

    async function generateSingleAgent(agentId, threadId, route = {}) {
      const agent = getAgent(agentId);
      const model = route.needDeep && cfg.deepModel ? cfg.deepModel : cfg.model;
      const contextType = threadId === 'group' ? 'group' : 'private';
      const raw = await callLLM([{ role: 'system', content: agentPrompt(agent, contextType, threadId) }, ...plainChatMessages(threadId, 18)], { model, temperature: contextType === 'group' ? 0.88 : 0.84 });
      return cleanAgentReply(raw, agent);
    }

    async function generateGroupReply(route) {
      for (const speakerId of route.speakers) {
        const agent = getAgent(speakerId);
        const reply = await generateSingleAgent(speakerId, 'group', route);
        if (reply) getConversation('group').push(makeMessage('assistant', agent.name, reply));
        saveState();
        render();
      }
    }

    async function generatePrivateReply(id, route = {}) {
      const agent = getAgent(id);
      const reply = await generateSingleAgent(id, id, route);
      if (reply) getConversation(id).push(makeMessage('assistant', agent.name, reply));
      saveState();
    }

    async function generateReply(id, route = {}) {
      const currentThread = getThread(id);
      loading = true;
      render();
      try {
        if (currentThread.type === 'group') await generateGroupReply(route);
        else if (currentThread.type === 'agent') await generatePrivateReply(id, route);
        saveState();
      } catch (error) { showError(error.message); }
      finally { loading = false; render(); }
    }

    async function sendMessage(text) {
      if (!text || loading) return;
      showError('');
      const id = active;
      const route = await routeMessage(text, id);
      if (['safe', 'coarse', 'suggestive', 'nsfw'].includes(route.mode)) state.mode = route.mode;
      getConversation(id).push(makeMessage('user', '我', text));
      saveState();
      render();
      try {
        if (id !== 'coach' && route.needCoach) {
          state.coachVisible = true;
          active = 'coach';
          getConversation('coach').push(makeMessage('user', '我', text));
          const model = route.needDeep && cfg.deepModel ? cfg.deepModel : cfg.model;
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, { role: 'user', content: text }], { model, temperature: 0.45 });
          getConversation('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState();
          render();
          return;
        }
        if (getThread(id).type === 'coach') {
          const coachReply = await callLLM([{ role: 'system', content: coachPrompt() }, ...plainChatMessages('coach')], { temperature: 0.45 });
          getConversation('coach').push({ ...makeMessage('coach', '教练', coachReply), role: 'coach' });
          saveState();
          render();
          return;
        }
        await generateReply(id, route);
      } catch (error) { showError(error.message); }
    }

    function proactiveCandidate() {
      const hour = new Date().getHours();
      if (hour >= 0 && hour < 5) return { id: 'linchuan', text: '还没睡？' };
      if (hour >= 11 && hour < 14) return { id: 'zhaokai', text: '吃饭没，别又糊弄。' };
      if (hour >= 18 && hour < 22) return { id: 'zhouye', text: '晚上出来不？别窝着。' };
      const pool = [{ id: 'chenxiao', text: '人呢，你小子又消失了？' }, { id: 'ahang', text: '我靠我有点想吃夜宵了，你来不来。' }, { id: 'zhouye', text: '走啊，动一动。' }];
      return pool[Math.floor(Math.random() * pool.length)];
    }

    async function maybeProactive(force = false) {
      if (!state.prefs.proactive || loading || !cfg) return;
      const now = Date.now();
      const allMessages = Object.values(state.conv).flat();
      const lastAny = Math.max(...allMessages.map(message => message.ts || 0));
      const enoughIdle = now - lastAny > 2 * 60 * 60 * 1000;
      const enoughSinceProactive = now - (state.lastProactiveAt || 0) > 60 * 60 * 1000;
      if (!force && (!enoughIdle || !enoughSinceProactive)) return;
      const candidate = proactiveCandidate();
      const agent = getAgent(candidate.id);
      getConversation(candidate.id).push(makeMessage('assistant', agent.name, candidate.text, { proactive: true }));
      getConversation('group').push(makeMessage('assistant', agent.name, candidate.text, { proactive: true }));
      state.lastProactiveAt = now;
      saveState();
      render();
      if (state.prefs.notifications && 'Notification' in window && Notification.permission === 'granted') new Notification(senderName(agent.name), { body: candidate.text });
    }

    function openModal(title, html, mode) { modalMode = mode; $('#modalTitle').textContent = title; $('#modalBody').innerHTML = html; $('#deleteMsg').classList.toggle('hide', mode !== 'edit'); $('#mask').classList.remove('hide'); }
    function closeModal() { $('#mask').classList.add('hide'); editing = null; }
    function openEdit(messageId, mode) { const conversation = getConversation(); const index = conversation.findIndex(message => message.id === messageId); if (index < 0 || conversation[index].role === 'coach') return; editing = { id: messageId, mode }; openModal(mode === 'regen' ? '修改最后一句并重生' : '修改消息', `<textarea id="editText">${escapeHtml(conversation[index].content)}</textarea><small>保存后会修改上下文。</small>`, mode); }

    function saveModal() {
      if (modalMode === 'profile') { state.prefs.name = $('#pname').value.trim() || '我'; state.prefs.avatar = $('#pav').value.trim() || '我'; state.prefs.avatarUrl = $('#purl').value.trim(); saveState(); closeModal(); render(); return; }
      if (modalMode === 'remark') { state.prefs.remarks[active] = $('#rname').value.trim(); saveState(); closeModal(); render(); return; }
      if (modalMode === 'settings') { state.prefs.nsfwGuard = $('#nsfwGuard').checked; state.prefs.autoNSFW = $('#autoNSFW').checked; state.prefs.proactive = $('#proactiveSetting').checked; state.prefs.notifications = $('#notifySetting').checked; state.prefs.deepMode = $('#deepMode').value; if (state.prefs.notifications && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission(); saveState(); closeModal(); render(); return; }
      const conversation = getConversation();
      const index = conversation.findIndex(message => message.id === editing.id);
      const value = $('#editText').value.trim();
      if (index >= 0 && value) { conversation[index].content = value; conversation[index].edited = true; if (editing.mode === 'regen') { conversation.splice(index + 1); saveState(); closeModal(); routeMessage(value, active).then(route => generateReply(active, route)); return; } saveState(); }
      closeModal(); render();
    }

    function deleteMessage() { const conversation = getConversation(); const index = conversation.findIndex(message => message.id === (editing && editing.id)); if (index >= 0) conversation.splice(index, 1); saveState(); closeModal(); render(); }
    function openProfile() { openModal('个人资料', `<label>名称<input id="pname" value="${escapeHtml(state.prefs.name)}"></label><label>文字头像<input id="pav" value="${escapeHtml(state.prefs.avatar)}"></label><label>头像URL/Base64<input id="purl" value="${escapeHtml(state.prefs.avatarUrl)}"></label>`, 'profile'); }
    function openRemark() { openModal('备注名', `<label>备注名<input id="rname" value="${escapeHtml(state.prefs.remarks[active] || '')}"></label><small>仅本机显示。</small>`, 'remark'); }
    function openSettings() { openModal('v0.6.3 设置', `<label><input id="nsfwGuard" type="checkbox" ${state.prefs.nsfwGuard ? 'checked' : ''}> 成人/粗口总开关</label><label><input id="autoNSFW" type="checkbox" ${state.prefs.autoNSFW ? 'checked' : ''}> 自动判断 coarse / suggestive / nsfw</label><label><input id="proactiveSetting" type="checkbox" ${state.prefs.proactive ? 'checked' : ''}> 网页打开时允许 Agent 主动消息</label><label><input id="notifySetting" type="checkbox" ${state.prefs.notifications ? 'checked' : ''}> 浏览器通知权限</label><label>深思模式<select id="deepMode"><option value="auto" ${state.prefs.deepMode === 'auto' ? 'selected' : ''}>自动</option><option value="fast" ${state.prefs.deepMode === 'fast' ? 'selected' : ''}>快速</option><option value="deep" ${state.prefs.deepMode === 'deep' ? 'selected' : ''}>强制深思</option></select></label>`, 'settings'); }
    function regenerateLastUserMessage() { const conversation = getConversation(); for (let index = conversation.length - 1; index >= 0; index--) { if (conversation[index].role === 'user') { openEdit(conversation[index].id, 'regen'); return; } } showError('当前会话没有你的消息'); }
    function backup() { const blob = new Blob([JSON.stringify({ version: 'v0.6.3', state }, null, 2)], { type: 'application/json' }); const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'sports-bros-backup-v063.json'; link.click(); URL.revokeObjectURL(link.href); }
    function importBackup(file) { const reader = new FileReader(); reader.onload = () => { try { const data = JSON.parse(reader.result); if (data.state) { const base = defaultState(); state = { ...base, ...data.state, prefs: { ...base.prefs, ...(data.state.prefs || {}) }, conv: { ...base.conv, ...(data.state.conv || {}) }, memory: { ...base.memory, ...(data.state.memory || {}) } }; saveState(); render(); } else showError('格式不对'); } catch (error) { showError(error.message); } }; reader.readAsText(file); }

    function init() {
      try { cfg = JSON.parse(localStorage.getItem(CFG_KEY) || 'null'); const saved = JSON.parse(localStorage.getItem(STATE_KEY) || 'null'); if (saved) { const base = defaultState(); state = { ...base, ...saved, prefs: { ...base.prefs, ...(saved.prefs || {}) }, conv: { ...base.conv, ...(saved.conv || {}) }, memory: { ...base.memory, ...(saved.memory || {}) } }; } } catch {}
      $('#setupForm').onsubmit = event => { event.preventDefault(); cfg = { endpoint: $('#endpoint').value.trim(), key: $('#apiKey').value.trim(), model: $('#model').value.trim(), routerModel: $('#routerModel').value.trim(), deepModel: $('#deepModel').value.trim() }; localStorage.setItem(CFG_KEY, JSON.stringify(cfg)); render(); maybeProactive(true); };
      $('#resetCfg').onclick = () => { localStorage.removeItem(CFG_KEY); cfg = null; render(); };
      $('#chatForm').onsubmit = event => { event.preventDefault(); const value = $('#input').value.trim(); $('#input').value = ''; sendMessage(value); };
      $('#back').onclick = () => $('#chat').classList.remove('open');
      $('#profile').onclick = openProfile;
      $('#remark').onclick = openRemark;
      $('#settingsBtn').onclick = openSettings;
      $('#regen').onclick = regenerateLastUserMessage;
      $('#backup').onclick = backup;
      $('#importBtn').onclick = () => $('#file').click();
      $('#file').onchange = event => { if (event.target.files[0]) importBackup(event.target.files[0]); };
      $('#editToggle').onclick = () => { state.prefs.edit = !state.prefs.edit; saveState(); render(); };
      $('#coach').onclick = () => { state.coachVisible = true; active = 'coach'; $('#chat').classList.add('open'); render(); };
      $('#proactiveNow').onclick = () => maybeProactive(true);
      $('#clear').onclick = () => { getConversation(active).length = 0; saveState(); render(); };
      $('#cancel').onclick = closeModal;
      $('#save').onclick = saveModal;
      $('#deleteMsg').onclick = deleteMessage;
      $('#mask').onclick = event => { if (event.target.id === 'mask') closeModal(); };
      render(); maybeProactive(false); setInterval(() => maybeProactive(false), PROACTIVE_CHECK_MS);
    }

    init();
  </script>
</body>
