<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>今晚打不打球 v0.6.4</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f4f4f5;color:#111;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",system-ui,sans-serif}button,input,textarea{font:inherit}.hide{display:none!important}.setup{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}.card{width:100%;max-width:560px;background:#fff;border:1px solid #ddd;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px #0002}.head{background:#111;color:#fff;padding:24px}.head h1{margin:0}.head p{color:#ccc;line-height:1.6}.form{padding:20px;display:grid;gap:14px}label{font-weight:800}label span{display:block;margin-bottom:7px}input,textarea{width:100%;border:1px solid #ddd;border-radius:16px;padding:12px;outline:0;background:#fff}.btn{border:1px solid #ddd;border-radius:14px;background:#fff;padding:10px 12px;font-weight:850;cursor:pointer;white-space:nowrap}.pri{background:#111!important;color:#fff!important;border-color:#111!important}.app{height:100dvh;width:100vw;display:flex;overflow:hidden}.side{width:390px;max-width:100vw;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}.side-head{padding:16px;border-bottom:1px solid #ddd;flex-shrink:0}.side-head h1{margin:0;font-size:34px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.threads{padding:8px;overflow:auto;flex:1}.thread{width:100%;border:0;background:#fff;border-radius:20px;padding:12px;display:flex;gap:12px;text-align:left;align-items:center}.thread.active,.thread:hover{background:#eee}.avatar{width:46px;height:46px;min-width:46px;border-radius:17px;background:#111;color:#fff;display:grid;place-items:center;font-weight:900;font-size:18px;overflow:hidden}.thread-meta{min-width:0;flex:1}.thread-name{font-weight:900;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.preview{font-size:14px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat{flex:1;min-width:0;height:100dvh;display:flex;flex-direction:column;background:#f4f4f5}.topbar{min-height:64px;border-bottom:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:8px;flex-shrink:0}.top-left{display:flex;gap:10px;align-items:center;min-width:0}.chat-name{font-weight:900;font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.messages{flex:1;overflow:auto;padding:14px 10px;background:#f4f4f5}.inner{width:100%;max-width:860px;margin:0 auto;display:grid;gap:12px}.hint{background:#fff;border:1px solid #ddd;border-radius:24px;padding:13px 16px;color:#555;line-height:1.65;max-width:100%;overflow-wrap:anywhere;font-size:16px}.time-divider{justify-self:center;background:#e4e4e7;color:#555;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;margin:4px 0}.row{width:100%;display:flex;gap:10px;align-items:flex-start}.row.me{justify-content:flex-end}.message-col{max-width:min(76%,620px);min-width:0;display:flex;flex-direction:column;align-items:flex-start}.row.me .message-col{align-items:flex-end}.sender{font-size:13px;color:#666;margin:0 0 4px 4px}.bubble{max-width:100%;background:#fff;border:1px solid #ddd;border-radius:22px 22px 22px 7px;padding:10px 14px;white-space:pre-wrap;line-height:1.6;overflow-wrap:anywhere;word-break:break-word;font-size:17px}.row.me .bubble{background:#111;color:#fff;border-color:#111;border-radius:22px 22px 7px 22px}.meta-line{font-size:11px;color:#999;margin-top:3px}.composer{border-top:1px solid #ddd;background:#fff;padding:10px;padding-bottom:calc(10px + env(safe-area-inset-bottom));flex-shrink:0}.composer-form{width:100%;max-width:860px;margin:0 auto;display:flex;gap:8px}.composer-form input{border-radius:999px}.send{width:50px;min-width:50px;border-radius:999px}.error{color:#b91c1c;padding:6px 14px;background:#fff}.back{display:none}.typing{opacity:.7}.mask{position:fixed;inset:0;background:#0006;display:flex;align-items:center;justify-content:center;padding:14px;z-index:20}.modal{width:100%;max-width:560px;background:#fff;border-radius:22px;padding:16px;max-height:88dvh;overflow:auto}.modal h3{margin:0 0 12px}.modal textarea{min-height:120px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}@media(max-width:760px){.app{display:block}.side{width:100%;height:100dvh;border-right:0}.chat{position:fixed;inset:0;transform:translateX(100%);transition:.18s;z-index:5}.chat.open{transform:translateX(0)}.back{display:inline-block}.top-buttons .optional{display:none}.message-col{max-width:72%}.avatar{width:42px;height:42px;min-width:42px}.btn{font-size:16px;padding:10px 12px}}
  </style>
</head>
<body>
<section id="setup" class="setup">
  <div class="card"><div class="head"><h1>今晚打不打球</h1><p>v0.6.4：纯IM稳定版。群聊使用本地发言人兜底，Router失败也能回复。</p></div>
  <form id="setupForm" class="form">
    <label><span>Endpoint</span><input id="endpoint" value="https://api.deepseek.com"></label>
    <label><span>API Key</span><input id="apiKey" type="password" placeholder="sk-..."></label>
    <label><span>Main Model</span><input id="model" value="deepseek-chat"></label>
    <label><span>Router Model</span><input id="routerModel" value="deepseek-chat"></label>
    <button class="btn pri">进入IM</button>
  </form></div>
</section>
<section id="app" class="app hide">
  <aside class="side"><div class="side-head"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px"><div><h1>消息</h1><div id="sideSub" class="preview"></div></div><button id="resetCfg" class="btn">配置</button></div><div class="toolbar"><button id="backup" class="btn">备份</button><button id="importBtn" class="btn">导入</button><button id="clearAll" class="btn">清空</button><input id="file" type="file" accept="application/json" class="hide"></div></div><div id="threads" class="threads"></div></aside>
  <main id="chat" class="chat"><header class="topbar"><div class="top-left"><button id="back" class="btn back">‹</button><div id="chatAv" class="avatar">群</div><div><div id="chatName" class="chat-name"></div><div id="chatSub" class="preview"></div></div></div><div class="top-buttons"><button id="regen" class="btn optional">重生</button><button id="clear" class="btn optional">清空当前</button></div></header><section class="messages"><div class="inner"><div id="hint" class="hint"></div><div id="list" class="inner"></div><div id="typing" class="row hide"><div class="avatar">…</div><div class="bubble typing">生成中...</div></div><div id="anchor"></div></div></section><div id="err" class="error"></div><footer class="composer"><form id="chatForm" class="composer-form"><input id="input" placeholder="发消息..."><button class="btn pri send">➤</button></form></footer></main>
</section>
<div id="mask" class="mask hide"><div class="modal"><h3 id="modalTitle"></h3><div id="modalBody"></div><div class="modal-actions"><button id="cancel" class="btn">取消</button><button id="save" class="btn pri">保存</button></div></div></div>
<script>
const CFG_KEYS=['sports-bros-cfg-v064','sports-bros-cfg-v063','sports-bros-api-config','sports-bros-scene-config-v04'];
const CFG_KEY='sports-bros-cfg-v064';
const STATE_KEY='sports-bros-state-v064';
const TIME_GAP_MS=5*60*1000;
const agents=[
 {id:'zhouye',name:'周野',tag:'篮球队',av:'周',core:'外向主心骨，行动号召型，喜欢直接把人拉出去。',voice:'短句，直接，爱喊人，像兄弟群里的主心骨。'},
 {id:'chenxiao',name:'陈骁',tag:'足球队',av:'陈',core:'嘴欠损友，起哄、拆台、接梗快。',voice:'爱吐槽，爱接梗，嘴欠但没恶意。'},
 {id:'linchuan',name:'林川',tag:'田径队',av:'林',core:'话少行动派，冷面但会做事，关心不解释。',voice:'短、稳、少废话，直接回应。'},
 {id:'zhaokai',name:'赵恺',tag:'健身房',av:'赵',core:'自律健身脑，催饭、催睡、催动起来。',voice:'靠谱直接，带点直男说教。'},
 {id:'ahang',name:'阿航',tag:'游泳队',av:'航',core:'阳光话痨，热闹、黏人、接话快。',voice:'话多，热情，气氛组。'}
];
const threads=[{id:'group',type:'group',name:'今晚打不打球',tag:'置顶群聊',av:'群'},...agents.map(a=>({...a,type:'agent'}))];
let cfg=null,active='group',loading=false,editing=null;
function $(s){return document.querySelector(s)}
function esc(v){return String(v||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function now(){return Date.now()}
function make(role,sender,content){return{id:String(now())+Math.random().toString(36).slice(2),role,sender,content,ts:now()}}
function defaultState(){return{prefs:{name:'我'},conv:{group:[make('assistant','周野','进群了啊。以后这就是「今晚打不打球」。'),make('assistant','陈骁','先说好，进群了就别装高冷。'),make('assistant','阿航','晚上吃不吃夜宵，先投票。')],zhouye:[make('assistant','周野','有事直接说。刚练完，手机在手。')],chenxiao:[make('assistant','陈骁','咋了，又来找我唠嗑？')],linchuan:[make('assistant','林川','嗯，我在。')],zhaokai:[make('assistant','赵恺','先问一句，今天吃饭没。')],ahang:[make('assistant','阿航','你来得正好，我刚想找人说话。')]}}}
let state=defaultState();
function getConv(id=active){if(!state.conv[id])state.conv[id]=[];return state.conv[id]}
function thread(id=active){return threads.find(t=>t.id===id)||threads[0]}
function agent(id){return agents.find(a=>a.id===id)}
function save(){localStorage.setItem(STATE_KEY,JSON.stringify(state))}
function loadCfg(){for(const k of CFG_KEYS){try{const x=JSON.parse(localStorage.getItem(k)||'null');if(x&&x.key)return x}catch{}}return null}
function saveCfg(x){localStorage.setItem(CFG_KEY,JSON.stringify(x));localStorage.setItem('sports-bros-api-config',JSON.stringify(x))}
function apiUrl(){const e=(cfg.endpoint||'').trim().replace(/\/$/,'');if(e.endsWith('/chat/completions'))return e;if(e.endsWith('/v1'))return e+'/chat/completions';return e+'/v1/chat/completions'}
async function callLLM(messages,model){const res=await fetch(apiUrl(),{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${cfg.key}`},body:JSON.stringify({model:model||cfg.model||'deepseek-chat',messages,temperature:.82,stream:false})});const txt=await res.text();let data={};try{data=JSON.parse(txt)}catch{}if(!res.ok)throw new Error((data.error&&data.error.message)||txt);return data.choices[0].message.content.trim()}
function fullTime(ts){const d=new Date(ts);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function divTime(ts){const d=new Date(ts);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function recent(id,limit=18){return getConv(id).slice(-limit).map(m=>({role:m.role==='user'?'user':'assistant',content:`${m.sender}：${m.content}`}))}
function chooseSpeakers(text){if(/吃|饭|饿|夜宵|喝/.test(text))return['zhaokai','ahang','zhouye'];if(/睡|困|累|烦|崩|难受|emo/.test(text))return['linchuan','zhaokai','chenxiao'];if(/打球|篮球|出去|走|操场/.test(text))return['zhouye','chenxiao','ahang'];if(/哈哈|笑|草|操|靠|服了/.test(text))return['chenxiao','zhouye'];const pool=[['zhouye','chenxiao'],['linchuan','zhaokai'],['chenxiao','ahang'],['zhouye','linchuan'],['zhaokai','ahang']];return pool[Math.floor(Math.random()*pool.length)]}
async function routeGroup(text){try{const raw=await callLLM([{role:'system',content:'你是群聊发言路由器。只输出JSON：{"speakers":["zhouye","chenxiao"]}。speakers从zhouye,chenxiao,linchuan,zhaokai,ahang中选2到3个。'}, {role:'user',content:text}], cfg.routerModel||cfg.model);const m=raw.match(/\{[\s\S]*\}/);const obj=m?JSON.parse(m[0]):JSON.parse(raw);const ids=(obj.speakers||[]).filter(id=>agents.some(a=>a.id===id)).slice(0,3);if(ids.length)return ids}catch(e){}return chooseSpeakers(text)}
function promptFor(a,id){return`${a.name}，18岁成年人，${a.tag}。${a.core}\n说话方式：${a.voice}\n当前是${id==='group'?'群聊':'私聊'}，用户叫我。\n规则：只扮演${a.name}，只输出自己的消息正文，不带名字前缀，不写时间，不写旁白。回复1到3句，像真实IM，围绕用户刚才的话回应。`}
function cleanReply(text,name){return String(text||'').replace(new RegExp('^'+name+'[：:]\s*'),'').replace(/^时间[：:].*$/gm,'').trim()||'嗯。'}
async function replyAgent(agentId,id){const a=agent(agentId);const msgs=[{role:'system',content:promptFor(a,id)},...recent(id,20)];const txt=await callLLM(msgs);return cleanReply(txt,a.name)}
async function sendMessage(text){if(loading)return;const conv=getConv();conv.push(make('user','我',text));save();render();loading=true;$('#typing').classList.remove('hide');$('#err').textContent='';try{if(active==='group'){const ids=await routeGroup(text);for(const id of ids){const a=agent(id);const reply=await replyAgent(id,'group');getConv('group').push(make('assistant',a.name,reply));render();}}else{const a=agent(active);const reply=await replyAgent(active,active);getConv(active).push(make('assistant',a.name,reply));}}catch(e){$('#err').textContent=e.message||'生成失败';if(active==='group'){const ids=chooseSpeakers(text).slice(0,2);ids.forEach(id=>getConv('group').push(make('assistant',agent(id).name,localFallback(id,text))))}}finally{loading=false;$('#typing').classList.add('hide');save();render();}}
function localFallback(id,text){const map={zhouye:'走啊，别光说。',chenxiao:'笑死，你小子又开始了。',linchuan:'嗯，我听着。',zhaokai:'先别急，吃饭喝水。',ahang:'我靠，那你细说。'};return map[id]||'嗯。'}
function renderThreads(){$('#threads').innerHTML=threads.map(t=>{const msgs=getConv(t.id);const last=msgs[msgs.length-1];return`<button class="thread ${active===t.id?'active':''}" data-id="${t.id}"><div class="avatar">${t.av}</div><div class="thread-meta"><div class="thread-name">${esc(t.name)}</div><div class="preview">${esc(last?`${last.sender}：${last.content}`:t.tag)}</div></div></button>`}).join('');document.querySelectorAll('.thread').forEach(b=>b.onclick=()=>{active=b.dataset.id;$('#chat').classList.add('open');render()})}
function renderChat(){const t=thread();$('#chatName').textContent=t.name;$('#chatSub').textContent=t.tag||'';$('#chatAv').textContent=t.av;$('#hint').textContent=t.id==='group'?'群聊稳定版：发消息后会自动选2到3个体育生回复。Router失败时会走本地兜底。':`${t.name} · ${t.tag}`;let last=0;$('#list').innerHTML=getConv().map(m=>{let div='';if(!last||m.ts-last>TIME_GAP_MS)div=`<div class="time-divider">${divTime(m.ts)}</div>`;last=m.ts;const me=m.role==='user';return div+`<div class="row ${me?'me':''}">${me?'':`<div class="avatar">${esc((m.sender||'?').slice(0,1))}</div>`}<div class="message-col">${me?'':`<div class="sender">${esc(m.sender)}</div>`}<div class="bubble">${esc(m.content)}</div><div class="meta-line">${fullTime(m.ts)}</div></div>${me?'<div class="avatar">我</div>':''}</div>`}).join('');$('#anchor').scrollIntoView({block:'end'})}
function render(){renderThreads();renderChat();$('#sideSub').textContent=`${threads.length}个会话 · 纯IM v0.6.4`}
function openApp(){try{state=JSON.parse(localStorage.getItem(STATE_KEY)||'null')||defaultState()}catch{state=defaultState()}$('#setup').classList.add('hide');$('#app').classList.remove('hide');render()}
function init(){cfg=loadCfg();if(cfg){$('#endpoint').value=cfg.endpoint||'https://api.deepseek.com';$('#apiKey').value=cfg.key||'';$('#model').value=cfg.model||'deepseek-chat';$('#routerModel').value=cfg.routerModel||cfg.model||'deepseek-chat'}$('#setupForm').onsubmit=e=>{e.preventDefault();cfg={endpoint:$('#endpoint').value.trim(),key:$('#apiKey').value.trim(),model:$('#model').value.trim(),routerModel:$('#routerModel').value.trim()};if(!cfg.key){alert('请填写API Key');return}saveCfg(cfg);openApp()};if(cfg&&cfg.key)openApp();$('#chatForm').onsubmit=e=>{e.preventDefault();const text=$('#input').value.trim();if(!text)return;$('#input').value='';sendMessage(text)};$('#back').onclick=()=>$('#chat').classList.remove('open');$('#resetCfg').onclick=()=>{$('#setup').classList.remove('hide');$('#app').classList.add('hide')};$('#clear').onclick=()=>{if(confirm('清空当前会话？')){state.conv[active]=[];save();render()}};$('#clearAll').onclick=()=>{if(confirm('清空所有IM记录？')){state=defaultState();save();render()}};$('#regen').onclick=()=>{const conv=getConv();const lastUser=[...conv].reverse().find(m=>m.role==='user');if(lastUser)sendMessage(lastUser.content)};$('#backup').onclick=()=>{const blob=new Blob([JSON.stringify({cfg,state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sports-bros-im-v064-backup.json';a.click();URL.revokeObjectURL(a.href)};$('#importBtn').onclick=()=>$('#file').click();$('#file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);if(data.cfg){cfg=data.cfg;saveCfg(cfg)}if(data.state){state=data.state;save()}render()}catch{alert('导入失败')}};r.readAsText(f)}}
init();
</script>
</body>
</html>
